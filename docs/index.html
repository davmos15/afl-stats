<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AFL Stats Search</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'] },
                    colors: {
                        navy: { 800: '#01285e', 900: '#011a3e', 950: '#000d20' },
                        electric: { 400: '#3b8bff', 500: '#0053FF', 600: '#0044d4' },
                    }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        if (localStorage.getItem('afl_theme') !== 'light') {
            document.documentElement.classList.add('dark');
        }
    </script>
    <style>
        .fade-in { animation: fadeIn 0.25s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
        .dropdown-enter { animation: dropIn 0.15s ease-out; }
        @keyframes dropIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
        .usage-bar { transition: width 0.4s ease-out; }
        .hero-gradient { background: linear-gradient(135deg, #e8f0fe 0%, #d4e4fc 50%, #c2d6f8 100%); }
        .dark .hero-gradient { background: linear-gradient(135deg, #000c1f 0%, #01285e 60%, #013a8a 100%); }
        .hero-pattern {
            background-image: radial-gradient(circle at 20% 80%, rgba(0,83,255,0.06) 0%, transparent 50%),
                              radial-gradient(circle at 80% 20%, rgba(59,139,255,0.04) 0%, transparent 40%);
        }
        .dark .hero-pattern {
            background-image: radial-gradient(circle at 20% 80%, rgba(0,83,255,0.12) 0%, transparent 50%),
                              radial-gradient(circle at 80% 20%, rgba(59,139,255,0.08) 0%, transparent 40%);
        }
        .search-glow:focus { box-shadow: 0 0 0 3px rgba(0,83,255,0.25), 0 4px 20px rgba(0,83,255,0.1); }
        .view-btn { color: #6b7280; }
        .view-btn:hover { background: rgba(0,83,255,0.08); color: #0053FF; }
        .dark .view-btn { color: #6b7280; }
        .dark .view-btn:hover { background: rgba(59,139,255,0.1); color: #3b8bff; }
        .active-view { background: rgba(0,83,255,0.1) !important; color: #0053FF !important; font-weight: 600; }
        .dark .active-view { background: rgba(59,139,255,0.15) !important; color: #3b8bff !important; }
        .quick-btn {
            background: rgba(0,83,255,0.08);
            color: #01285e;
            border: 1px solid rgba(0,83,255,0.2);
        }
        .quick-btn:hover {
            background: rgba(0,83,255,0.15);
            color: #01285e;
            border-color: rgba(0,83,255,0.35);
        }
        .dark .quick-btn {
            background: rgba(255,255,255,0.18);
            color: #fff;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.25);
        }
        .dark .quick-btn:hover {
            background: rgba(255,255,255,0.28);
            color: #fff;
            border-color: rgba(255,255,255,0.4);
        }
        .result-card {
            border-left: 4px solid #0053FF;
        }
        .dark .result-card {
            border-left-color: #3b8bff;
        }
        .table-header-row {
            background: linear-gradient(90deg, #01285e, #0053FF);
        }
        .dark .table-header-row {
            background: linear-gradient(90deg, #011a3e, #01285e);
        }
        .sort-header { cursor: pointer; user-select: none; }
        .sort-header:hover { background: rgba(255,255,255,0.1); }
        .sort-arrow { font-size: 9px; margin-left: 3px; opacity: 0.5; }
        .sort-arrow.active { opacity: 1; }
        .add-col-wrap { display: inline-flex; align-items: center; gap: 4px; margin-left: 8px; }
        .add-col-input {
            width: 0; opacity: 0; padding: 0; border: none; font-size: 11px;
            transition: width 0.2s ease, opacity 0.2s ease, padding 0.2s ease;
            background: transparent; outline: none;
            color: #374151; border-bottom: 1px solid transparent;
        }
        .dark .add-col-input { color: #d1d5db; }
        .add-col-wrap.open .add-col-input {
            width: 140px; opacity: 1; padding: 2px 0;
            border-bottom-color: #0053FF;
        }
        .dark .add-col-wrap.open .add-col-input { border-bottom-color: #3b8bff; }
        .add-col-spinner { display: none; }
        .add-col-wrap.loading .add-col-spinner { display: inline-block; }
        .add-col-wrap.loading .add-col-icon { display: none; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-[#0a0e1a] min-h-screen font-sans transition-colors duration-200">

    <!-- Hero / Header -->
    <div class="hero-gradient hero-pattern" role="banner">
        <div class="max-w-3xl mx-auto px-5 pt-6 pb-10">
            <!-- Top row -->
            <div class="flex items-center justify-between mb-8">
                <div class="flex items-center gap-2.5">
                    <!-- AFL-style footy icon -->
                    <div class="w-9 h-9 rounded-full bg-black/10 dark:bg-white/20 flex items-center justify-center">
                        <svg class="w-5 h-5 text-navy-800 dark:text-white" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><ellipse cx="12" cy="12" rx="6" ry="9" stroke="currentColor" stroke-width="1.5" fill="none"/><line x1="12" y1="3" x2="12" y2="21" stroke="currentColor" stroke-width="1.2"/><path d="M6.5 8.5Q12 7 17.5 8.5" stroke="currentColor" stroke-width="1" fill="none"/><path d="M6.5 15.5Q12 17 17.5 15.5" stroke="currentColor" stroke-width="1" fill="none"/></svg>
                    </div>
                    <div>
                        <h1 class="text-xl font-extrabold text-gray-900 dark:text-white tracking-tight leading-none">AFL Stats</h1>
                        <p class="text-[11px] text-electric-500 dark:text-cyan-300 font-medium tracking-wide uppercase">Search Engine</p>
                    </div>
                </div>
                <button onclick="toggleTheme()" aria-label="Toggle dark mode" class="p-2 rounded-lg text-gray-700 dark:text-white/80 hover:text-gray-900 dark:hover:text-white hover:bg-black/10 dark:hover:bg-white/15 focus:outline-none focus:ring-2 focus:ring-electric-500/50 dark:focus:ring-white/50 transition-all">
                    <svg id="icon-sun" class="w-5 h-5 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
                    <svg id="icon-moon" class="w-5 h-5 block dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
                </button>
            </div>

            <!-- Tagline -->
            <div class="text-center mb-6">
                <h2 class="text-2xl sm:text-3xl font-extrabold text-gray-900 dark:text-white tracking-tight">Ask anything about footy</h2>
                <p class="text-electric-500 dark:text-sky-300 mt-1.5 text-sm">Powered by live data from Squiggle &amp; AFL Tables</p>
            </div>

            <!-- Search -->
            <form onsubmit="handleSearch(event)" id="search-form" class="mb-5" role="search">
                <div class="relative max-w-2xl mx-auto">
                    <label for="query-input" class="sr-only">Search AFL statistics</label>
                    <div class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 dark:text-white/70" aria-hidden="true">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                    </div>
                    <input type="text" id="query-input"
                        class="search-glow w-full pl-12 pr-28 py-4 bg-white dark:bg-white/20 backdrop-blur-md border border-gray-300 dark:border-white/35 rounded-2xl text-[15px] text-gray-900 dark:text-white placeholder-gray-400 dark:placeholder-sky-200 focus:outline-none focus:border-electric-500 dark:focus:border-white/60 transition-all"
                        placeholder="Who kicked the most goals in 2025?"
                        required autofocus>
                    <button type="submit" id="search-btn"
                        class="absolute right-2 top-2 bottom-2 px-6 bg-white text-navy-800 text-sm font-bold rounded-xl hover:bg-blue-50 focus:outline-none focus:ring-2 focus:ring-white/50 transition-all shadow-lg shadow-black/10">
                        Search
                    </button>
                    <div id="search-spinner" class="absolute right-2 top-2 bottom-2 px-6 bg-white text-navy-800 text-sm font-bold rounded-xl items-center gap-2 justify-center shadow-lg" style="display:none" aria-live="polite">
                        <svg class="animate-spin h-4 w-4" viewBox="0 0 24 24" aria-hidden="true"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>
                        Searching
                    </div>
                </div>
            </form>

            <!-- Quick queries -->
            <div class="flex flex-wrap gap-2 justify-center max-w-2xl mx-auto">
                <button onclick="submitQuery(this)" class="quick-btn text-xs px-3 py-1.5 rounded-full transition-all focus:outline-none focus:ring-2 focus:ring-white/50">Last 5 Grand Final winners</button>
                <button onclick="submitQuery(this)" class="quick-btn text-xs px-3 py-1.5 rounded-full transition-all focus:outline-none focus:ring-2 focus:ring-white/50">Top goal kickers 2025</button>
                <button onclick="submitQuery(this)" class="quick-btn text-xs px-3 py-1.5 rounded-full transition-all focus:outline-none focus:ring-2 focus:ring-white/50">2026 ladder</button>
                <button onclick="submitQuery(this)" class="quick-btn text-xs px-3 py-1.5 rounded-full transition-all focus:outline-none focus:ring-2 focus:ring-white/50">Collingwood win/loss record</button>
            </div>
        </div>
    </div>

    <!-- Main content -->
    <div class="max-w-3xl mx-auto px-5 -mt-2 pb-12">

        <!-- AI selector bar -->
        <div class="flex items-center justify-between py-3 mb-4">
            <div class="relative">
                <button onclick="toggleAIPanel()" id="ai-toggle" aria-label="AI provider settings"
                    class="inline-flex items-center gap-1.5 text-xs text-gray-600 dark:text-gray-300 hover:text-gray-800 dark:hover:text-gray-100 bg-white dark:bg-[#141827] border border-gray-200 dark:border-gray-700/60 px-3 py-1.5 rounded-full shadow-sm focus:outline-none focus:ring-2 focus:ring-electric-500/40 transition-all">
                    <span class="w-2 h-2 rounded-full" id="ai-status-dot"></span>
                    <span id="ai-status-label" class="font-medium"></span>
                    <span id="usage-badge" class="text-gray-400 dark:text-gray-500"></span>
                    <svg class="w-3 h-3 opacity-40" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
                </button>

                <!-- Dropdown -->
                <div id="ai-panel" class="hidden absolute left-0 top-full mt-2 w-80 bg-white dark:bg-[#141827] border border-gray-200 dark:border-gray-700/60 rounded-2xl shadow-xl dark:shadow-black/50 z-50 dropdown-enter overflow-hidden">
                    <div class="p-3.5 pb-0">
                        <p class="text-[10px] uppercase tracking-wider text-gray-400 dark:text-gray-500 font-semibold mb-2">AI Provider</p>
                        <div class="grid grid-cols-2 gap-2 mb-3">
                            <button onclick="selectProvider('gemini')" id="provider-btn-gemini"
                                class="provider-btn px-3 py-2 text-xs rounded-xl border-2 dark:border-gray-700/60 transition-all text-center">
                                <div class="font-bold">Gemini</div>
                                <div class="text-[10px] text-gray-400 dark:text-gray-500 mt-0.5" id="provider-usage-gemini"></div>
                            </button>
                            <button onclick="selectProvider('groq')" id="provider-btn-groq"
                                class="provider-btn px-3 py-2 text-xs rounded-xl border-2 dark:border-gray-700/60 transition-all text-center">
                                <div class="font-bold">Groq</div>
                                <div class="text-[10px] text-gray-400 dark:text-gray-500 mt-0.5" id="provider-usage-groq"></div>
                            </button>
                            <button onclick="selectProvider('openai')" id="provider-btn-openai"
                                class="provider-btn px-3 py-2 text-xs rounded-xl border-2 dark:border-gray-700/60 transition-all text-center">
                                <div class="font-bold">OpenAI</div>
                                <div class="text-[10px] text-gray-400 dark:text-gray-500 mt-0.5" id="provider-usage-openai"></div>
                            </button>
                            <button onclick="selectProvider('claude')" id="provider-btn-claude"
                                class="provider-btn px-3 py-2 text-xs rounded-xl border-2 dark:border-gray-700/60 transition-all text-center">
                                <div class="font-bold">Claude</div>
                                <div class="text-[10px] text-gray-400 dark:text-gray-500 mt-0.5" id="provider-usage-claude"></div>
                            </button>
                        </div>
                        <div class="relative">
                            <input type="password" id="api-key-input"
                                class="w-full pl-3 pr-8 py-2.5 border border-gray-200 dark:border-gray-700/60 rounded-xl text-xs bg-gray-50 dark:bg-[#0d1019] text-gray-800 dark:text-gray-200 focus:ring-2 focus:ring-electric-500/30 focus:border-electric-500 transition-all"
                                placeholder="Paste your API key here">
                            <button onclick="toggleKeyVisibility()" aria-label="Toggle key visibility" class="absolute right-2.5 top-1/2 -translate-y-1/2 text-gray-400 dark:text-gray-500 hover:text-gray-600 dark:hover:text-gray-300">
                                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                            </button>
                        </div>
                        <div class="flex items-center justify-between mt-2 mb-3">
                            <a id="signup-link" href="#" target="_blank" class="text-[11px] text-electric-500 hover:text-electric-400 font-medium hover:underline">Get a free key</a>
                            <p class="text-[10px] text-gray-500 dark:text-gray-400">Stored in your browser only</p>
                        </div>
                    </div>
                    <!-- Usage -->
                    <div class="border-t border-gray-100 dark:border-gray-700/40 p-3.5 bg-gray-50/50 dark:bg-white/[0.02]">
                        <div class="flex items-center justify-between mb-2.5">
                            <span class="text-[11px] font-semibold text-gray-500 dark:text-gray-400">Today's Usage</span>
                            <span id="reset-timer" class="text-[10px] text-gray-400 dark:text-gray-500"></span>
                        </div>
                        <div class="mb-2.5">
                            <div class="flex items-center justify-between mb-1">
                                <span class="text-[10px] text-gray-400 dark:text-gray-500 font-medium">Requests</span>
                                <span id="req-count" class="text-[10px] text-gray-500 dark:text-gray-400 font-semibold"></span>
                            </div>
                            <div class="h-1.5 bg-gray-200 dark:bg-gray-800 rounded-full overflow-hidden">
                                <div id="req-bar" class="usage-bar h-full rounded-full" style="width:0%"></div>
                            </div>
                        </div>
                        <div class="mb-2">
                            <div class="flex items-center justify-between mb-1">
                                <span class="text-[10px] text-gray-400 dark:text-gray-500 font-medium">Tokens</span>
                                <span id="tok-count" class="text-[10px] text-gray-500 dark:text-gray-400 font-semibold"></span>
                            </div>
                            <div class="h-1.5 bg-gray-200 dark:bg-gray-800 rounded-full overflow-hidden">
                                <div id="tok-bar" class="usage-bar h-full rounded-full" style="width:0%"></div>
                            </div>
                        </div>
                        <div class="flex items-center justify-between mt-2.5">
                            <span id="tier-label" class="text-[10px] text-gray-500 dark:text-gray-400"></span>
                            <button onclick="resetUsage()" class="text-[10px] text-gray-500 dark:text-gray-400 hover:text-red-500 font-medium transition-colors">Reset</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="flex items-center gap-3 text-[10px] text-gray-500 dark:text-gray-400">
                <span>Data: Squiggle API + AFL Tables</span>
                <span aria-hidden="true">|</span>
                <a href="https://github.com/davmos15/afl-stats" target="_blank" rel="noopener noreferrer" class="hover:text-gray-700 dark:hover:text-gray-200 underline decoration-gray-300 dark:decoration-gray-600 transition-colors">GitHub</a>
            </div>
        </div>

        <div id="results" aria-live="polite" role="region" aria-label="Search results"></div>
    </div>

<script>
// ── Theme ──
function toggleTheme() {
    var html = document.documentElement;
    if (html.classList.contains('dark')) { html.classList.remove('dark'); localStorage.setItem('afl_theme','light'); }
    else { html.classList.add('dark'); localStorage.setItem('afl_theme','dark'); }
}

// ── Close panel on outside click ──
document.addEventListener('click', function(e) {
    var panel = document.getElementById('ai-panel'), toggle = document.getElementById('ai-toggle');
    if (!panel.contains(e.target) && !toggle.contains(e.target)) panel.classList.add('hidden');
});

// ── Provider config ──
var PROVIDERS = {
    gemini:  { name:'Google Gemini',   short:'Gemini',  color:'#4285F4', signup:'https://aistudio.google.com/apikey',      limits:{ requests:1500, tokens:1000000, resetTZ:'America/Los_Angeles', label:'Free tier \u00B7 resets midnight PT' }},
    groq:    { name:'Groq (Llama)',    short:'Groq',    color:'#F55036', signup:'https://console.groq.com/keys',             limits:{ requests:14400,tokens:500000,  resetTZ:'UTC',                 label:'Free tier \u00B7 resets midnight UTC' }},
    openai:  { name:'OpenAI (ChatGPT)',short:'ChatGPT', color:'#10A37F', signup:'https://platform.openai.com/api-keys',   limits:{ requests:500,  tokens:200000,  resetTZ:'UTC',                 label:'Paid \u00B7 resets midnight UTC' }},
    claude:  { name:'Anthropic Claude',short:'Claude',  color:'#D97706', signup:'https://console.anthropic.com/settings/keys', limits:{ requests:1000, tokens:400000,  resetTZ:'UTC',             label:'Paid \u00B7 resets midnight UTC' }},
};

function todayStr() { return new Date().toISOString().slice(0,10); }
function getProvider() { return localStorage.getItem('afl_provider') || 'gemini'; }
function getApiKey() { return localStorage.getItem('afl_key_'+getProvider()) || ''; }
function getUsage(p) { var r = JSON.parse(localStorage.getItem('afl_usage_'+p)||'{}'); return r.date===todayStr() ? r : {queries:0,total_tokens:0,date:todayStr()}; }
function saveUsage(p,u) { u.date=todayStr(); localStorage.setItem('afl_usage_'+p,JSON.stringify(u)); }
function recordUsage(provider,tokens) { var u=getUsage(provider); u.queries+=1; u.total_tokens+=tokens||0; saveUsage(provider,u); updateUI(); }
function formatTokens(n) { if(n>=1e6) return (n/1e6).toFixed(1)+'M'; if(n>=1e3) return (n/1e3).toFixed(1)+'k'; return n.toString(); }
function getResetMs(tz) { var now=new Date(), parts={}; new Intl.DateTimeFormat('en-US',{timeZone:tz,hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false}).formatToParts(now).forEach(function(p){parts[p.type]=p.value;}); return (86400-((parseInt(parts.hour)||0)*3600+(parseInt(parts.minute)||0)*60+(parseInt(parts.second)||0)))*1000; }
function formatCountdown(ms) { var h=Math.floor(ms/3600000),m=Math.floor((ms%3600000)/60000); return h>0?'Resets in '+h+'h '+m+'m':'Resets in '+m+'m'; }
function barColor(pct) { return pct>90?'#ef4444':pct>70?'#f59e0b':'#0053FF'; }

function selectProvider(p) { localStorage.setItem('afl_provider',p); document.getElementById('api-key-input').value=localStorage.getItem('afl_key_'+p)||''; updateUI(); }
function toggleAIPanel() { document.getElementById('ai-panel').classList.toggle('hidden'); }
function toggleKeyVisibility() { var el=document.getElementById('api-key-input'); el.type=el.type==='password'?'text':'password'; }
function resetUsage() { localStorage.removeItem('afl_usage_'+getProvider()); updateUI(); }
function submitQuery(btn) { document.getElementById('query-input').value=btn.textContent.trim(); handleSearch(); }

function updateUI() {
    var cur=getProvider(), p=PROVIDERS[cur], hasKey=!!getApiKey(), usage=getUsage(cur), lim=p.limits;
    document.getElementById('ai-status-dot').style.backgroundColor = hasKey ? p.color : '#6b7280';
    document.getElementById('ai-status-label').textContent = p.short;
    document.getElementById('usage-badge').textContent = usage.queries>0 ? '\u00B7 '+usage.queries+'/'+lim.requests : '';
    ['gemini','groq','openai','claude'].forEach(function(id) {
        var btn=document.getElementById('provider-btn-'+id), c=PROVIDERS[id].color;
        if (id===cur) { btn.style.borderColor=c; btn.style.backgroundColor=c+'12'; btn.style.color=c; }
        else { btn.style.borderColor=''; btn.style.backgroundColor=''; btn.style.color=''; }
        var u=getUsage(id), uel=document.getElementById('provider-usage-'+id);
        if(uel) uel.textContent = u.queries>0 ? u.queries+' today' : '';
    });
    document.getElementById('signup-link').href = p.signup;
    document.getElementById('signup-link').textContent = 'Get a free '+p.short+' key';
    var rPct=Math.min(100,(usage.queries/lim.requests)*100), tPct=Math.min(100,(usage.total_tokens/lim.tokens)*100);
    document.getElementById('req-count').textContent = usage.queries+' / '+lim.requests.toLocaleString();
    document.getElementById('req-bar').style.width = rPct+'%';
    document.getElementById('req-bar').style.backgroundColor = barColor(rPct);
    document.getElementById('tok-count').textContent = formatTokens(usage.total_tokens)+' / '+formatTokens(lim.tokens);
    document.getElementById('tok-bar').style.width = tPct+'%';
    document.getElementById('tok-bar').style.backgroundColor = barColor(tPct);
    document.getElementById('reset-timer').textContent = formatCountdown(getResetMs(lim.resetTZ));
    document.getElementById('tier-label').textContent = lim.label;
}

setInterval(function(){ var el=document.getElementById('reset-timer'); if(el) el.textContent=formatCountdown(getResetMs(PROVIDERS[getProvider()].limits.resetTZ)); }, 60000);
document.getElementById('api-key-input').addEventListener('input', function(){ localStorage.setItem('afl_key_'+getProvider(), this.value.trim()); updateUI(); });
updateUI();
var _sk=getApiKey(); if(_sk) document.getElementById('api-key-input').value=_sk;

// ── Squiggle API (live data) ──
var SQUIGGLE = 'https://api.squiggle.com.au/';

async function fetchSquiggle(endpoint, params) {
    var url = new URL(SQUIGGLE);
    url.searchParams.set('q', endpoint);
    if (params) Object.keys(params).forEach(function(k){ url.searchParams.set(k, params[k]); });
    try {
        var r = await fetch(url);
        if (!r.ok) return [];
        var d = await r.json();
        return d[endpoint] || [];
    } catch(e) { return []; }
}

// ── Player stats (pre-scraped, updated daily by GitHub Actions) ──
var _playerStatsCache = null;
async function fetchPlayerStats() {
    if (_playerStatsCache) return _playerStatsCache;
    try {
        var r = await fetch('player-stats.json');
        if (!r.ok) return null;
        _playerStatsCache = await r.json();
        return _playerStatsCache;
    } catch(e) { return null; }
}

async function fetchLiveContext(query) {
    var currentYear = new Date().getFullYear(), lower = query.toLowerCase();
    var years = new Set();

    // Parse explicit years mentioned
    for (var y = 2012; y <= currentYear; y++) { if (lower.includes(String(y))) years.add(y); }

    // Parse "since YYYY" / "from YYYY" to generate year ranges
    var rangeMatch = lower.match(/(?:since|from|after)\s+(20[12]\d)/);
    if (rangeMatch) {
        var startYear = parseInt(rangeMatch[1], 10);
        for (var ry = startYear; ry <= currentYear; ry++) years.add(ry);
    }

    // Parse "between YYYY and YYYY" / "YYYY to YYYY"
    var betweenMatch = lower.match(/(20[12]\d)\s*(?:to|-|and|through)\s*(20[12]\d)/);
    if (betweenMatch) {
        var bStart = parseInt(betweenMatch[1], 10), bEnd = parseInt(betweenMatch[2], 10);
        for (var by = Math.min(bStart,bEnd); by <= Math.max(bStart,bEnd); by++) years.add(by);
    }

    // Parse "last N years"
    var lastNMatch = lower.match(/last\s+(\d+)\s+years?/);
    if (lastNMatch) {
        var n = parseInt(lastNMatch[1], 10);
        for (var ly = currentYear - n + 1; ly <= currentYear; ly++) years.add(ly);
    }

    if (['this year','this season','current','latest','now','today'].some(function(w){return lower.includes(w);})) years.add(currentYear);
    if (lower.includes('last year') || lower.includes('last season')) years.add(currentYear-1);
    if (years.size === 0) years.add(currentYear);

    var wantsPlayers = ['goal kicker','kick','mark','handball','disposal','tackle','player','who scored','who kicked','top scorer','brownlow','coleman','leading','most goals'].some(function(w){return lower.includes(w);});
    var wantsTeamGoals = ['total goals','team goals','goals for all','goals scored','average goals','goals per'].some(function(w){return lower.includes(w);});

    var tasks = [], keys = [];
    years.forEach(function(yr) {
        keys.push('standings_'+yr); tasks.push(fetchSquiggle('standings',{year:yr}));
        keys.push('games_'+yr);     tasks.push(fetchSquiggle('games',{year:yr}));
    });
    if (wantsPlayers) {
        keys.push('player_stats'); tasks.push(fetchPlayerStats());
    }
    var raw = await Promise.all(tasks);
    var results = {};
    keys.forEach(function(k,i){ results[k] = raw[i]; });

    var sections = [];
    var sortedYears = Array.from(years).sort();

    // If query wants team-level goal aggregates across multiple years, pre-aggregate
    if (wantsTeamGoals && sortedYears.length > 1) {
        var teamAgg = {}; // { teamName: { goals_for, goals_against, behinds_for, behinds_against, points_for, points_against, games } }
        sortedYears.forEach(function(yr) {
            var games = results['games_'+yr] || [];
            var completed = games.filter(function(g){ return g.complete===100; });
            completed.forEach(function(g) {
                var ht = g.hteam, at = g.ateam;
                if (!teamAgg[ht]) teamAgg[ht] = {goals_for:0, goals_against:0, behinds_for:0, behinds_against:0, points_for:0, points_against:0, games:0};
                if (!teamAgg[at]) teamAgg[at] = {goals_for:0, goals_against:0, behinds_for:0, behinds_against:0, points_for:0, points_against:0, games:0};
                teamAgg[ht].goals_for += (g.hgoals||0); teamAgg[ht].goals_against += (g.agoals||0);
                teamAgg[ht].behinds_for += (g.hbehinds||0); teamAgg[ht].behinds_against += (g.abehinds||0);
                teamAgg[ht].points_for += (g.hscore||0); teamAgg[ht].points_against += (g.ascore||0);
                teamAgg[ht].games += 1;
                teamAgg[at].goals_for += (g.agoals||0); teamAgg[at].goals_against += (g.hgoals||0);
                teamAgg[at].behinds_for += (g.abehinds||0); teamAgg[at].behinds_against += (g.hbehinds||0);
                teamAgg[at].points_for += (g.ascore||0); teamAgg[at].points_against += (g.hscore||0);
                teamAgg[at].games += 1;
            });
        });
        var aggArr = Object.keys(teamAgg).map(function(t) {
            var a = teamAgg[t];
            return {team:t, games:a.games, goals_for:a.goals_for, goals_against:a.goals_against, behinds_for:a.behinds_for, points_for:a.points_for, points_against:a.points_against, avg_goals_per_game:Math.round(a.goals_for/a.games*100)/100, avg_points_per_game:Math.round(a.points_for/a.games*100)/100};
        });
        aggArr.sort(function(a,b){ return b.goals_for - a.goals_for; });
        sections.push('=== TEAM GOALS AGGREGATED '+sortedYears[0]+'-'+sortedYears[sortedYears.length-1]+' ===\n'+JSON.stringify(aggArr));
    }

    sortedYears.forEach(function(yr) {
        var standings = results['standings_'+yr] || [];
        if (standings.length) {
            var slim = standings.map(function(s){ return {rank:s.rank, team:s.name, P:s.played, W:s.wins, L:s.losses, D:s.draws, pts:s.pts, pct:Math.round((s.percentage||0)*10)/10}; });
            slim.sort(function(a,b){ return (a.rank||99)-(b.rank||99); });
            sections.push('=== '+yr+' LADDER ===\n'+JSON.stringify(slim));
        }
        var games = results['games_'+yr] || [];
        if (games.length) {
            var completed = games.filter(function(g){ return g.complete===100; });
            if (completed.length) {
                // For single-year or non-aggregate queries, include recent results
                if (!wantsTeamGoals || sortedYears.length <= 1) {
                    completed.sort(function(a,b){ return (b.date||'').localeCompare(a.date||''); });
                    var recent = completed.slice(0,10).map(function(g){
                        return {round:g.round, label:g.is_final?'Final':'', home:g.hteam, home_score:g.hscore, home_goals:g.hgoals, away:g.ateam, away_score:g.ascore, away_goals:g.agoals, winner:g.winner, date:String(g.date||'').slice(0,10)};
                    });
                    sections.push('=== '+yr+' RECENT RESULTS ===\n'+JSON.stringify(recent));
                }

                // For single-year team goal queries, aggregate that year
                if (wantsTeamGoals && sortedYears.length <= 1) {
                    var yrTeamAgg = {};
                    completed.forEach(function(g) {
                        var ht = g.hteam, at = g.ateam;
                        if (!yrTeamAgg[ht]) yrTeamAgg[ht] = {goals_for:0, goals_against:0, points_for:0, points_against:0, games:0};
                        if (!yrTeamAgg[at]) yrTeamAgg[at] = {goals_for:0, goals_against:0, points_for:0, points_against:0, games:0};
                        yrTeamAgg[ht].goals_for += (g.hgoals||0); yrTeamAgg[ht].goals_against += (g.agoals||0);
                        yrTeamAgg[ht].points_for += (g.hscore||0); yrTeamAgg[ht].points_against += (g.ascore||0);
                        yrTeamAgg[ht].games += 1;
                        yrTeamAgg[at].goals_for += (g.agoals||0); yrTeamAgg[at].goals_against += (g.hgoals||0);
                        yrTeamAgg[at].points_for += (g.ascore||0); yrTeamAgg[at].points_against += (g.hscore||0);
                        yrTeamAgg[at].games += 1;
                    });
                    var yrAggArr = Object.keys(yrTeamAgg).map(function(t) {
                        var a = yrTeamAgg[t];
                        return {team:t, games:a.games, goals_for:a.goals_for, goals_against:a.goals_against, points_for:a.points_for, points_against:a.points_against, avg_goals_per_game:Math.round(a.goals_for/a.games*100)/100};
                    });
                    yrAggArr.sort(function(a,b){ return b.goals_for - a.goals_for; });
                    sections.push('=== '+yr+' TEAM GOALS ===\n'+JSON.stringify(yrAggArr));
                }

                var finals = completed.filter(function(g){ return g.is_final; });
                if (finals.length) {
                    var gfRound = Math.max.apply(null, finals.map(function(g){return g.round||0;}));
                    var gfGames = finals.filter(function(g){return g.round===gfRound;});
                    if (gfGames.length) {
                        var gf = gfGames[0];
                        sections.push('=== '+yr+' GRAND FINAL ===\n'+gf.hteam+' '+gf.hscore+' vs '+gf.ateam+' '+gf.ascore+' - Winner: '+gf.winner+' (Date: '+String(gf.date||'').slice(0,10)+')');
                    }
                }
            }
        }

        if (wantsPlayers) {
            var ps = results['player_stats'];
            var yearData = ps && ps[String(yr)];
            if (yearData && yearData.players) {
                var allPlayers = yearData.players;
                var teamFilter = null;
                var teamNames = ['Adelaide','Brisbane','Carlton','Collingwood','Essendon','Fremantle','Geelong','Gold Coast','Greater Western Sydney','GWS','Hawthorn','Melbourne','North Melbourne','Port Adelaide','Richmond','St Kilda','Sydney','West Coast','Western Bulldogs'];
                teamNames.forEach(function(t) {
                    if (lower.includes(t.toLowerCase())) teamFilter = t;
                });
                if (lower.includes('gws')) teamFilter = 'Greater Western Sydney';

                if (teamFilter) {
                    var filtered = allPlayers.filter(function(p){ return p.team.toLowerCase().includes(teamFilter.toLowerCase()); });
                    if (filtered.length) {
                        var teamGoals = filtered.slice().sort(function(a,b){return b.goals-a.goals;}).slice(0,20);
                        sections.push('=== '+yr+' '+teamFilter.toUpperCase()+' PLAYER STATS ===\n'+JSON.stringify(teamGoals.map(function(p){return {player:p.player, team:p.team, games:p.games, goals:p.goals, disposals:p.disposals, kicks:p.kicks, marks:p.marks, tackles:p.tackles};})));
                    }
                }
                if (yearData.top_goals && yearData.top_goals.length) {
                    sections.push('=== '+yr+' TOP GOAL KICKERS (LEAGUE) ===\n'+JSON.stringify(yearData.top_goals.slice(0,15).map(function(p){return {player:p.player, team:p.team, games:p.games, goals:p.goals};})));
                }
                if (yearData.top_disposals && yearData.top_disposals.length) {
                    sections.push('=== '+yr+' TOP DISPOSAL WINNERS (LEAGUE) ===\n'+JSON.stringify(yearData.top_disposals.slice(0,10).map(function(p){return {player:p.player, team:p.team, games:p.games, disposals:p.disposals};})));
                }
            }
        }
    });
    return sections.length ? sections.join('\n\n') : '(No live data available - answer from your own knowledge)';
}

// ── Build prompt ──
function buildPrompt(query, liveData) {
    return 'You are an AFL (Australian Football League) statistics expert with deep knowledge of players, teams, seasons, records, and history.\n\n' +
        'You have access to LIVE DATA below AND your own extensive knowledge of AFL history. Use BOTH to give the best answer.\n\n' +
        '--- LIVE AFL DATA (current as of today) ---\n' + liveData + '\n--- END LIVE DATA ---\n\n' +
        'CRITICAL RULES:\n- For current/recent season data (2025, 2026): ONLY use the live data above. Do NOT guess, infer, or use your training data for current season stats. If a player is not in the live data, do NOT include them.\n' +
        '- Players change teams every year via trades and retirements. NEVER assume a player is still at the same team as previous years. Only use the team listed in the live data.\n' +
        '- For historical questions (pre-2025 Grand Finals, all-time records, etc.): use your training knowledge.\n' +
        '- When the live data contains team-specific player stats, use ONLY those players for that team.\n\n' +
        'Answer the following question. Return your response as a JSON object:\n\n' +
        '{\n  "answer": "A clear, concise text answer",\n  "data": [{"Column1": "Value1", "Column2": "Value2"}],\n' +
        '  "r_code": "# R code using fitzRoy\\nlibrary(fitzRoy)\\n...",\n  "need_clarification": false,\n  "options": []\n}\n\n' +
        'Rules:\n- "answer" (required): Helpful text answering the question. State whether data is from live feed or historical knowledge.\n' +
        '- "data" (optional, null if N/A): Tabular data as array of objects. Max 20 rows.\n' +
        '- "r_code" (optional, null if N/A): R code using fitzRoy package to reproduce the query. Produce a dataframe called result_df.\n' +
        '- "need_clarification": true only if the question is too ambiguous. Provide 2-4 options.\n' +
        '- Return ONLY valid JSON. No markdown, no code fences.\n\n' +
        'User question: ' + query;
}

// ── LLM calls ──
async function parseRateLimitError(r, provider) {
    var detail = '';
    try {
        var body = await r.json();
        // Gemini: {error: {message: "Resource has been exhausted (e.g. check quota).", status: "RESOURCE_EXHAUSTED", details: [...]}}
        if (body.error && body.error.message) detail = body.error.message;
        // OpenAI: {error: {message: "Rate limit reached for ..."}}
        // Claude: {error: {message: "..."}}
    } catch(e) {}
    var lim = PROVIDERS[provider] ? PROVIDERS[provider].limits : null;
    var resetInfo = lim ? ' Resets at midnight ' + (lim.resetTZ === 'America/Los_Angeles' ? 'PT' : 'UTC') + '.' : '';
    // Mark usage as at limit so the UI reflects it
    if (lim) {
        var u = getUsage(provider);
        u.queries = Math.max(u.queries, lim.requests);
        saveUsage(provider, u);
        updateUI();
    }
    var msg = 'Rate limit reached for ' + (PROVIDERS[provider] ? PROVIDERS[provider].short : provider) + '.';
    if (detail) {
        if (/per day|per_day|RPD|daily/i.test(detail)) msg += ' Daily request limit exceeded.';
        else if (/per minute|per_minute|RPM/i.test(detail)) msg += ' Too many requests per minute. Wait a moment.';
        else if (/token/i.test(detail)) msg += ' Token limit exceeded.';
    }
    msg += resetInfo;
    throw new Error(msg);
}

async function callGemini(prompt, apiKey) {
    var url = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key='+encodeURIComponent(apiKey);
    var r = await fetch(url, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ contents:[{parts:[{text:prompt}]}], generationConfig:{responseMimeType:'application/json'} })
    });
    if (!r.ok) {
        if (r.status===429) await parseRateLimitError(r, 'gemini');
        if (r.status===401||r.status===403) throw new Error('Invalid API key. Check your key in the AI settings.');
        throw new Error('API error ('+r.status+')');
    }
    var d = await r.json();
    var text = d.candidates[0].content.parts[0].text;
    var result = parseJSON(text);
    var u = d.usageMetadata || {};
    result._usage = { input_tokens:u.promptTokenCount||0, output_tokens:u.candidatesTokenCount||0, total_tokens:u.totalTokenCount||0, model:'gemini-2.5-flash' };
    return result;
}

async function callGroq(prompt, apiKey) {
    var r;
    try {
        r = await fetch('https://api.groq.com/openai/v1/chat/completions', {
            method:'POST', headers:{'Content-Type':'application/json','Authorization':'Bearer '+apiKey},
            body: JSON.stringify({ model:'llama-3.3-70b-versatile', messages:[{role:'user',content:prompt}], response_format:{type:'json_object'}, temperature:0.3 })
        });
    } catch(e) {
        throw new Error('Cannot reach Groq API from browser (CORS blocked). Try using the Python backend instead, or switch to Gemini/OpenAI.');
    }
    if (!r.ok) {
        if (r.status===429) await parseRateLimitError(r, 'groq');
        if (r.status===401||r.status===403) throw new Error('Invalid API key. Check your key in the AI settings.');
        throw new Error('API error ('+r.status+')');
    }
    var d = await r.json();
    var text = d.choices[0].message.content;
    var result = parseJSON(text);
    var u = d.usage || {};
    result._usage = { input_tokens:u.prompt_tokens||0, output_tokens:u.completion_tokens||0, total_tokens:u.total_tokens||0, model:'llama-3.3-70b' };
    return result;
}

async function callClaude(prompt, apiKey) {
    var r = await fetch('https://api.anthropic.com/v1/messages', {
        method:'POST',
        headers:{
            'Content-Type':'application/json',
            'x-api-key':apiKey,
            'anthropic-version':'2023-06-01',
            'anthropic-dangerous-direct-browser-access':'true'
        },
        body: JSON.stringify({ model:'claude-sonnet-4-20250514', max_tokens:4096, messages:[{role:'user',content:prompt}] })
    });
    if (!r.ok) {
        if (r.status===429) await parseRateLimitError(r, 'claude');
        if (r.status===401||r.status===403) throw new Error('Invalid API key. Check your key in the AI settings.');
        throw new Error('API error ('+r.status+')');
    }
    var d = await r.json();
    var text = d.content[0].text;
    var result = parseJSON(text);
    var u = d.usage || {};
    result._usage = { input_tokens:u.input_tokens||0, output_tokens:u.output_tokens||0, total_tokens:(u.input_tokens||0)+(u.output_tokens||0), model:'claude-sonnet-4' };
    return result;
}

function parseJSON(text) {
    text = text.trim();
    if (text.startsWith('```')) { text = text.split('\n').slice(1).join('\n'); if (text.endsWith('```')) text = text.slice(0,-3); text = text.trim(); }
    try { return JSON.parse(text); } catch(e) { return {answer:text, data:null, r_code:null}; }
}

// ── Render results ──
function escapeHtml(s) { var d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

function renderResults(result, provider) {
    var el = document.getElementById('results');
    if (result.error) {
        var isRateLimit = /rate limit/i.test(result.error);
        var errHtml = '<div class="'+(isRateLimit ? 'bg-amber-50 dark:bg-amber-900/20 border border-amber-200 dark:border-amber-800/30' : 'bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800/30')+' rounded-2xl p-5 fade-in">';
        errHtml += '<p class="text-sm '+(isRateLimit ? 'text-amber-700 dark:text-amber-400' : 'text-red-600 dark:text-red-400')+' font-medium">'+escapeHtml(result.error)+'</p>';
        if (isRateLimit) {
            var cur = getProvider(), lim = PROVIDERS[cur].limits, usage = getUsage(cur);
            var rPct = Math.min(100, (usage.queries / lim.requests) * 100);
            errHtml += '<div class="mt-3"><div class="flex items-center justify-between mb-1"><span class="text-[11px] text-amber-600 dark:text-amber-400 font-medium">Requests today</span>';
            errHtml += '<span class="text-[11px] text-amber-600 dark:text-amber-400 font-semibold">'+usage.queries+' / '+lim.requests+'</span></div>';
            errHtml += '<div class="h-2 bg-amber-100 dark:bg-amber-900/40 rounded-full overflow-hidden"><div class="h-full rounded-full bg-amber-500" style="width:'+rPct+'%"></div></div>';
            errHtml += '<p class="text-[10px] text-amber-500 dark:text-amber-500 mt-1.5">'+formatCountdown(getResetMs(lim.resetTZ))+'</p></div>';
        }
        errHtml += '</div>';
        el.innerHTML = errHtml;
        return;
    }
    if (result.need_clarification) {
        var html = '<div class="result-card bg-white dark:bg-[#141827] border border-gray-200 dark:border-gray-700/60 rounded-2xl p-5 shadow-sm fade-in">';
        html += '<p class="text-sm font-bold text-gray-700 dark:text-gray-300 mb-3">Did you mean:</p><div class="space-y-1.5">';
        (result.options||[]).forEach(function(opt) {
            html += '<button onclick="submitClarification(this)" class="block w-full text-left px-4 py-3 rounded-xl text-sm text-gray-600 dark:text-gray-300 hover:bg-electric-500/5 dark:hover:bg-electric-500/10 hover:text-electric-500 dark:hover:text-electric-400 border border-transparent hover:border-electric-500/20 transition-all font-medium">'+escapeHtml(opt)+'</button>';
        });
        html += '</div></div>';
        el.innerHTML = html;
        return;
    }

    var html = '<div class="result-card bg-white dark:bg-[#141827] border border-gray-200 dark:border-gray-700/60 rounded-2xl shadow-sm overflow-hidden fade-in">';
    // Answer
    html += '<div class="px-6 pt-6 pb-4"><p class="text-[15px] text-gray-700 dark:text-gray-300 leading-relaxed">'+escapeHtml(result.answer||'')+'</p></div>';

    // Data table + charts
    if (result.data && result.data.length) {
        html += '<div class="mx-6 mb-5">';
        html += '<div class="flex items-center gap-1 mb-3 flex-wrap">';
        html += '<button onclick="showView(\'table\',this)" class="view-btn active-view px-2.5 py-1 text-[11px] rounded-lg transition-all flex items-center gap-1"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M3 14h18M3 6h18M3 18h18"/></svg>Table</button>';

        html += '<button onclick="showView(\'column\',this)" class="view-btn px-2.5 py-1 text-[11px] rounded-lg transition-all flex items-center gap-1"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"/></svg>Column</button>';

        html += '<span class="add-col-icon"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg></span>';
        html += '<span class="add-col-spinner"><svg class="w-3 h-3 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg></span>';
        html += 'Add Column</button>';
        html += '<input type="text" class="add-col-input" id="add-col-input" placeholder="e.g. behinds, win %" onkeydown="if(event.key===\'Enter\'){event.preventDefault();handleAddColumn();}">';
        html += '</span>';
        html += '</div>';

        // Suggested columns
        html += '<div id="suggested-cols" class="flex flex-wrap gap-1.5 mb-3"></div>';

        // Table container (populated by rebuildTable)
        html += '<div id="view-table" class="rounded-xl overflow-hidden border border-gray-100 dark:border-gray-700/40"><div class="overflow-x-auto" id="table-scroll"></div></div>';

        // Chart canvas
        html += '<div id="view-chart" class="hidden border border-gray-100 dark:border-gray-700/40 rounded-xl p-4 bg-white dark:bg-transparent" style="min-height:300px"><canvas id="results-chart"></canvas></div>';
        html += '</div>';
    }

    // R code
    if (result.r_code) {
        html += '<div class="mx-6 mb-5"><details class="group"><summary class="cursor-pointer text-xs text-gray-400 dark:text-gray-500 hover:text-electric-500 dark:hover:text-electric-400 transition-colors select-none flex items-center gap-1.5 font-medium">';
        html += '<svg class="w-3 h-3 transition-transform group-open:rotate-90" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>';
        html += 'R code (fitzRoy)</summary>';
        html += '<pre class="mt-2 bg-navy-950 text-emerald-400 p-4 rounded-xl overflow-x-auto text-xs leading-relaxed border border-navy-800/50"><code>'+escapeHtml(result.r_code)+'</code></pre></details></div>';
    }

    // Footer
    if (result._usage) {
        var pName = PROVIDERS[provider] ? PROVIDERS[provider].name : provider;
        html += '<div class="px-6 py-3 border-t border-gray-100 dark:border-gray-700/30 flex items-center justify-between bg-gray-50/50 dark:bg-white/[0.01]">';
        html += '<span class="text-[11px] text-gray-500 dark:text-gray-400 font-medium">'+escapeHtml(pName)+'</span>';
        html += '<span class="text-[11px] text-gray-500 dark:text-gray-400 font-medium">'+(result._usage.total_tokens||0)+' tokens</span>';
        html += '</div>';
        recordUsage(provider, result._usage.total_tokens||0);
    }
    html += '</div>';
    el.innerHTML = html;

    window._chartData = result.data;
    window._chartInstance = null;
    window._sortCol = null;
    window._sortDir = 'asc';
    if (result.data && result.data.length) {
        rebuildTable();
        showSuggestedColumns();
    }
}

function submitClarification(btn) {
    document.getElementById('query-input').value = btn.textContent.trim();
    handleSearch();
}

// ── Table sort & add column ──
function formatColName(k) { return k.replace(/_/g, ' '); }

function showSuggestedColumns() {
    var el = document.getElementById('suggested-cols');
    if (!el || !window._chartData || !window._chartData.length) return;
    var keys = Object.keys(window._chartData[0]).map(function(k) { return k.toLowerCase(); });
    // Build suggestions based on what columns exist
    var pool = [
        {label:'Behinds', when:['goals','goal']},
        {label:'Total Points', when:['goals','goal']},
        {label:'Points Per Game', when:['goals','points','score']},
        {label:'Goals Per Game', when:['goals','games','played']},
        {label:'Win %', when:['wins','win','w']},
        {label:'Win/Loss Ratio', when:['wins','losses','w','l']},
        {label:'Disposals', when:['kicks','marks','handballs']},
        {label:'Kicks', when:['disposals','marks']},
        {label:'Marks', when:['kicks','disposals']},
        {label:'Tackles', when:['disposals','kicks','marks']},
        {label:'Handballs', when:['kicks','disposals']},
        {label:'Score Per Game', when:['points_for','total_points','score']},
        {label:'Percentage', when:['points_for','points_against','for','against']},
        {label:'Margin', when:['score','points','hscore','ascore']},
        {label:'Games Played', when:['goals','player','team']},
    ];
    var suggestions = [];
    pool.forEach(function(s) {
        if (suggestions.length >= 5) return;
        // skip if column already exists
        if (keys.some(function(k) { return k.replace(/_/g,' ') === s.label.toLowerCase(); })) return;
        // include if any trigger word matches an existing column
        if (s.when.some(function(w) { return keys.some(function(k) { return k.indexOf(w) !== -1; }); })) {
            suggestions.push(s.label);
        }
    });
    if (!suggestions.length) { el.innerHTML = ''; return; }
    var html = '<span class="text-[10px] text-gray-400 dark:text-gray-500 self-center mr-1">Add:</span>';
    suggestions.forEach(function(s) {
        html += '<button onclick="addSuggestedColumn(this)" class="text-[10px] px-2.5 py-1 rounded-full border border-gray-200 dark:border-gray-700/50 text-gray-500 dark:text-gray-400 hover:border-electric-500 dark:hover:border-electric-400 hover:text-electric-500 dark:hover:text-electric-400 transition-all">' + escapeHtml(s) + '</button>';
    });
    el.innerHTML = html;
}

function addSuggestedColumn(btn) {
    var term = btn.textContent.trim();
    document.getElementById('add-col-input').value = term;
    var wrap = document.getElementById('add-col-wrap');
    if (!wrap.classList.contains('open')) wrap.classList.add('open');
    handleAddColumn();
}

function rebuildTable() {
    var data = window._chartData;
    if (!data || !data.length) return;
    var el = document.getElementById('table-scroll');
    if (!el) return;
    var keys = Object.keys(data[0]);
    var html = '<table class="min-w-full"><thead><tr class="table-header-row">';
    keys.forEach(function(k) {
        var arrow = '';
        if (window._sortCol === k) {
            arrow = '<span class="sort-arrow active">' + (window._sortDir === 'asc' ? '\u25B2' : '\u25BC') + '</span>';
        } else {
            arrow = '<span class="sort-arrow">\u25B2</span>';
        }
        html += '<th class="sort-header px-4 py-2.5 text-left text-[11px] font-bold text-white uppercase tracking-wider" onclick="sortTable(\''+k.replace(/'/g,"\\'")+'\')">' + escapeHtml(formatColName(k)) + arrow + '</th>';
    });
    html += '</tr></thead><tbody class="divide-y divide-gray-100 dark:divide-gray-700/30">';
    data.forEach(function(row, idx) {
        var bg = idx % 2 === 0 ? 'bg-white dark:bg-transparent' : 'bg-gray-50/70 dark:bg-white/[0.02]';
        html += '<tr class="' + bg + ' hover:bg-blue-50/50 dark:hover:bg-electric-500/5 transition-colors">';
        var first = true;
        keys.forEach(function(k) {
            var cls = first ? 'font-semibold text-navy-800 dark:text-gray-100' : 'text-gray-600 dark:text-gray-400';
            html += '<td class="px-4 py-2.5 text-sm whitespace-nowrap ' + cls + '">' + escapeHtml(String(row[k] != null ? row[k] : '')) + '</td>';
            first = false;
        });
        html += '</tr>';
    });
    html += '</tbody></table>';
    el.innerHTML = html;
}

function sortTable(colKey) {
    var data = window._chartData;
    if (!data || !data.length) return;
    if (window._sortCol === colKey) {
        window._sortDir = window._sortDir === 'asc' ? 'desc' : 'asc';
    } else {
        window._sortCol = colKey;
        window._sortDir = 'asc';
    }
    var dir = window._sortDir === 'asc' ? 1 : -1;
    // detect numeric column
    var isNum = data.every(function(r) { var v = r[colKey]; return v == null || v === '' || !isNaN(Number(v)); });
    data.sort(function(a, b) {
        var va = a[colKey], vb = b[colKey];
        if (va == null) va = '';
        if (vb == null) vb = '';
        if (isNum) return (Number(va) - Number(vb)) * dir;
        return String(va).localeCompare(String(vb)) * dir;
    });
    rebuildTable();
}

function toggleAddColumn() {
    var wrap = document.getElementById('add-col-wrap');
    if (!wrap) return;
    wrap.classList.toggle('open');
    if (wrap.classList.contains('open')) {
        var inp = document.getElementById('add-col-input');
        if (inp) { inp.value = ''; inp.focus(); }
    }
}

async function handleAddColumn() {
    var inp = document.getElementById('add-col-input');
    var term = inp ? inp.value.trim() : '';
    if (!term || !window._chartData || !window._chartData.length) return;
    var provider = getProvider(), apiKey = getApiKey();
    if (!apiKey) return;
    var wrap = document.getElementById('add-col-wrap');
    wrap.classList.add('loading');

    var prompt = 'You have this AFL statistics data:\n' + JSON.stringify(window._chartData) +
        '\n\nAdd a new column called "' + term + '" with appropriate values for each row. ' +
        'Use your AFL knowledge and the existing data to calculate or look up the values. ' +
        'Return a JSON object: {"data": [<updated array with new column>]}. ' +
        'Keep all existing columns and add the new one. No markdown, no code fences, no explanation.';
    try {
        var result;
        if (provider === 'gemini') result = await callGemini(prompt, apiKey);
        else if (provider === 'groq') result = await callGroq(prompt, apiKey);
        else if (provider === 'openai') result = await callOpenAI(prompt, apiKey);
        else if (provider === 'claude') result = await callClaude(prompt, apiKey);
        else throw new Error('Unknown provider');
        // The result is wrapped in standard format - extract the data
        var newData = null;
        if (result.data && Array.isArray(result.data) && result.data.length) {
            newData = result.data;
        } else if (result.answer) {
            // Try parsing the answer as JSON array
            try { newData = JSON.parse(result.answer); } catch(e) {}
        }
        // Also try parsing the raw result if it came back as a plain array
        if (!newData && Array.isArray(result)) newData = result;
        if (newData && Array.isArray(newData) && newData.length === window._chartData.length) {
            window._chartData = newData;
            rebuildTable();
            showSuggestedColumns();
        } else {
            // Fallback: try to merge just the new column
            if (newData && Array.isArray(newData) && newData.length) {
                var existingKeys = Object.keys(window._chartData[0]);
                var newKeys = Object.keys(newData[0]).filter(function(k) { return existingKeys.indexOf(k) === -1; });
                if (newKeys.length) {
                    window._chartData.forEach(function(row, i) {
                        if (newData[i]) {
                            newKeys.forEach(function(k) { row[k] = newData[i][k]; });
                        }
                    });
                    rebuildTable();
                    showSuggestedColumns();
                }
            }
        }
        if (result._usage) recordUsage(provider, result._usage.total_tokens || 0);
    } catch(err) {
        // silently fail - could show toast but keeping it simple
    } finally {
        wrap.classList.remove('loading');
        wrap.classList.remove('open');
    }
}

// ── Chart ──
function showView(view, btn) {
    document.querySelectorAll('.view-btn').forEach(function(b){ b.classList.remove('active-view'); });
    btn.classList.add('active-view');
    var t=document.getElementById('view-table'), c=document.getElementById('view-chart');
    if (view==='table') { t.classList.remove('hidden'); c.classList.add('hidden'); }
    else { t.classList.add('hidden'); c.classList.remove('hidden'); renderChart(view==='column'); }
}

function renderChart(horizontal) {
    if (!window._chartData || !window._chartData.length) return;
    if (typeof Chart === 'undefined') {
        var s = document.createElement('script');
        s.src = 'https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js';
        s.onload = function(){ buildChart(horizontal); };
        document.head.appendChild(s);
    } else { buildChart(horizontal); }
}

function buildChart(horizontal) {
    if (window._chartInstance) window._chartInstance.destroy();
    var data = window._chartData;
    var keys = Object.keys(data[0]), labelKey = keys[0];
    var labels = data.map(function(r){ var v=r[labelKey]; return typeof v==='string'&&v.length>20 ? v.substring(0,18)+'..' : v; });
    var numKeys = keys.filter(function(k,i){ return i>0 && data.some(function(r){ var v=r[k]; return typeof v==='number'||(typeof v==='string'&&!isNaN(parseFloat(v))&&isFinite(v)); }); });
    if (!numKeys.length) { document.getElementById('view-chart').innerHTML='<p class="text-sm text-gray-400 text-center py-8">No numeric data to chart</p>'; return; }
    var isDark = document.documentElement.classList.contains('dark');
    var palette = ['#0053FF','#10b981','#f59e0b','#ef4444','#8b5cf6','#ec4899','#06b6d4','#84cc16'];
    var datasets = numKeys.map(function(k,i){ return { label:k, data:data.map(function(r){return parseFloat(r[k])||0;}), backgroundColor:palette[i%palette.length]+(numKeys.length===1?'cc':'aa'), borderColor:palette[i%palette.length], borderWidth:1, borderRadius:5 }; });
    var gridColor = isDark ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.06)';
    var tickColor = isDark ? '#9ca3af' : '#6b7280';
    window._chartInstance = new Chart(document.getElementById('results-chart'), {
        type:'bar', data:{labels:labels, datasets:datasets},
        options:{ indexAxis:horizontal?'x':'y', responsive:true, maintainAspectRatio:false,
            plugins:{legend:{display:numKeys.length>1, position:'top', labels:{boxWidth:12, font:{size:11, weight:'600'}, color:tickColor}}},
            scales:{ x:{grid:{color:gridColor}, ticks:{font:{size:11}, color:tickColor, maxRotation:45}}, y:{grid:{color:gridColor}, ticks:{font:{size:11}, color:tickColor}, beginAtZero:true} }
        }
    });
    var h = horizontal ? Math.max(300,labels.length*28+60) : Math.max(300,350);
    document.getElementById('view-chart').style.height = h+'px';
}

// ── Search handler ──
async function handleSearch(e) {
    if (e) e.preventDefault();
    var query = document.getElementById('query-input').value.trim();
    if (!query) return;

    var provider = getProvider(), apiKey = getApiKey();
    if (!apiKey) {
        renderResults({error:'No API key set. Click the AI selector and paste your '+PROVIDERS[provider].short+' key.'}, provider);
        return;
    }

    document.getElementById('search-btn').style.display = 'none';
    var spinner = document.getElementById('search-spinner');
    spinner.style.display = 'flex';
    document.getElementById('results').innerHTML = '';

    try {
        var liveData = await fetchLiveContext(query);
        var prompt = buildPrompt(query, liveData);
        var result;
        if (provider === 'gemini') result = await callGemini(prompt, apiKey);
        else if (provider === 'groq') result = await callGroq(prompt, apiKey);
        else if (provider === 'openai') result = await callOpenAI(prompt, apiKey);
        else if (provider === 'claude') result = await callClaude(prompt, apiKey);
        else result = {error:'Unknown provider'};
        renderResults(result, provider);
    } catch(err) {
        renderResults({error: err.message || 'Something went wrong. Please try again.'}, provider);
    } finally {
        document.getElementById('search-btn').style.display = '';
        spinner.style.display = 'none';
    }
}
</script>
