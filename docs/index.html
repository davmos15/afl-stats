function matchesGround(gameVenue, filter) {
    if (!filter) return true;
    if (!gameVenue) return false;
    return gameVenue.toLowerCase().indexOf(filter.toLowerCase()) !== -1;
}

function getStateFilter() {
    var sel = document.getElementById('tf-state');
    if (!sel || sel.value === 'all') return null;
    return sel.value;
}

function matchesState(gameVenue, stateFilter) {
    if (!stateFilter) return true;
    if (!gameVenue) return false;
    // Check mapped states first
    var mapped = GROUND_STATES[gameVenue];
    if (mapped) return mapped === stateFilter;
    // For unknown venues, try partial match on state abbreviation in name
    return false;
}

function getTeamYears() {
    var season = document.getElementById('tf-season').value;
    var currentYear = new Date().getFullYear();
    if (season !== 'all') return [parseInt(season)];
    var from = parseInt(document.getElementById('tf-year-from').value) || 2012;
    var to = parseInt(document.getElementById('tf-year-to').value) || currentYear;
    if (from > to) { var tmp = from; from = to; to = tmp; }
    var years = [];
    for (var y = from; y <= to; y++) years.push(y);
    return years;
}

function matchPlayerName(fullName, text, mode) {
    var name = fullName.toLowerCase(), t = text.toLowerCase();
    if (!t) return true;
    if (mode === 'contains') return name.indexOf(t) !== -1;
    if (mode === 'starts') return name.indexOf(t) === 0;
    if (mode === 'exact') return name === t;
    if (mode === 'letters') return name.indexOf(t) !== -1;
    return name.indexOf(t) !== -1;
}

function teamMatchesFilter(teamName, filterValue) {
    if (filterValue === 'all') return true;
    var tn = teamName.toLowerCase(), fv = filterValue.toLowerCase();
    if (tn === fv) return true;
    if (tn.indexOf(fv) !== -1) return true;
    // Handle GWS aliases
    if (fv === 'gws giants' && (tn === 'greater western sydney' || tn.indexOf('gws') !== -1 || tn.indexOf('giants') !== -1)) return true;
    if (fv === 'greater western sydney' && (tn === 'gws giants' || tn.indexOf('gws') !== -1)) return true;
    if (fv === 'brisbane lions' && tn.indexOf('brisbane') !== -1) return true;
    if (fv === 'brisbane' && tn.indexOf('brisbane') !== -1) return true;
    return false;
}

async function runFinderQuery() {
    var btn = document.getElementById(_finderMode === 'player' ? 'finder-submit' : 'finder-submit-team');
    btn.classList.add('loading');
    btn.disabled = true;
    try {
        if (_finderMode === 'player') {
            await runPlayerQuery();
        } else {
            await runTeamQuery();
        }
    } catch(err) {
        renderFinderResults(null, 'Error: ' + err.message);
    } finally {
        btn.classList.remove('loading');
        btn.disabled = false;
    }
}

async function runPlayerQuery() {
    var season = document.getElementById('pf-season').value;
    var team = document.getElementById('pf-team').value;
    var nameMode = document.getElementById('pf-name-mode').value;
    var nameText = document.getElementById('pf-name').value.trim();
    var minGames = parseInt(document.getElementById('pf-mingames').value) || 0;
    var sortBy = document.getElementById('pf-sort').value;
    var limitVal = document.getElementById('pf-limit').value;
    var order = document.querySelector('input[name="pf-order"]:checked').value;
    var statsChecked = [];
    document.querySelectorAll('input[name="pf-stat"]:checked').forEach(function(cb){ statsChecked.push(cb.value); });
    if (!statsChecked.length) statsChecked = PLAYER_STATS.slice();
    var showAverages = document.getElementById('pf-averages') && document.getElementById('pf-averages').checked;

    var ps = await fetchPlayerStats();
    if (!ps) { renderFinderResults(null, 'Could not load player stats data.'); return; }

    var allPlayers = [];
    var years = [];
    if (season === 'all') {
        years = Object.keys(ps).sort();
    } else {
        years = [season];
    }
    years.forEach(function(yr) {
        var yearData = ps[yr];
        if (!yearData || !yearData.players) return;
        yearData.players.forEach(function(p) {
            var row = Object.assign({}, p);
            if (season === 'all') row.season = yr;
            allPlayers.push(row);
        });
    });

    // Apply filters
    var filtered = allPlayers.filter(function(p) {
        if (!matchPlayerName(p.player || '', nameText, nameMode)) return false;
        if (!teamMatchesFilter(p.team || '', team)) return false;
        if ((p.games || 0) < minGames) return false;
        return true;
    });

    // Sort (supports per-game average sorting when averages enabled)
    var dir = order === 'desc' ? -1 : 1;
    var sortFn;
    if (showAverages && sortBy !== 'games') {
        sortFn = function(a, b) {
            var ga = a.games || 1, gb = b.games || 1;
            var va = (a[sortBy] || 0) / ga, vb = (b[sortBy] || 0) / gb;
            return (va - vb) * dir;
        };
    } else {
        sortFn = function(a, b) {
            var va = a[sortBy], vb = b[sortBy];
            if (va == null) va = 0; if (vb == null) vb = 0;
            return (Number(va) - Number(vb)) * dir;
        };
    }
    filtered.sort(sortFn);

    // Limit
    var limit = limitVal === 'all' ? filtered.length : parseInt(limitVal);
    filtered = filtered.slice(0, limit);

    // Build result data
    var cols = ['player', 'team'];
    if (season === 'all') cols.splice(0, 0, 'season');
    statsChecked.forEach(function(s) { cols.push(s); });
    // Add per-game average columns
    var avgStats = showAverages ? statsChecked.filter(function(s){ return s !== 'games'; }) : [];
    avgStats.forEach(function(s) { cols.push(s + '_per_game'); });
    var resultData = filtered.map(function(p) {
        var row = {};
        cols.forEach(function(c) {
            if (c.endsWith('_per_game')) {
                var base = c.replace('_per_game', '');
                var gm = p.games || 1;
                row[c] = Math.round(((p[base] || 0) / gm) * 100) / 100;
            } else {
                row[c] = p[c] != null ? p[c] : '';
            }
        });
        return row;
    });

    var title = 'Player Stats';
    var parts = [];
    if (season !== 'all') parts.push(season);
    if (team !== 'all') parts.push(team);
    if (nameText) parts.push('"' + nameText + '"');
    parts.push('sorted by ' + sortBy);
    if (parts.length) title += ': ' + parts.join(', ');
    title += ' (' + resultData.length + ' results)';

    renderFinderResults(resultData, title);
    saveFinderToHistory(title, resultData);
}

async function runTeamQuery() {
    var view = _teamViewType;
    var team = document.getElementById('tf-team').value;
    var matchType = document.querySelector('input[name="tf-matchtype"]:checked').value;
    var limitVal = document.getElementById('tf-limit').value;

    if (view === 'ladder') {
        await runTeamLadder(team, limitVal);
    } else if (view === 'results') {
        await runTeamResults(team, matchType, limitVal);
    } else if (view === 'summary') {
        await runTeamSummary(team, matchType, limitVal);
    }
}

async function runTeamLadder(team, limitVal) {
    var years = getTeamYears();
    // Ladder only makes sense for single years (standings are per-season)
    // For multi-year, show each year's standings combined with a season column
    var allData = [];
    for (var i = 0; i < years.length; i++) {
        var standings = await fetchSquiggle('standings', {year: years[i]});
        if (!standings || !standings.length) continue;
        standings.forEach(function(s) {
            var row = {
                rank: s.rank, team: s.name, played: s.played, wins: s.wins,
                losses: s.losses, draws: s.draws, pts: s.pts,
                percentage: Math.round((s.percentage || 0) * 10) / 10
            };
            if (years.length > 1) row.season = years[i];
            allData.push(row);
        });
    }
    if (!allData.length) { renderFinderResults(null, 'No standings data found'); return; }

    allData.sort(function(a,b){
        if (years.length > 1) { var yd = (b.season||0)-(a.season||0); if (yd) return yd; }
        return (a.rank||99)-(b.rank||99);
    });

    if (team !== 'all') {
        allData = allData.filter(function(r) { return teamMatchesFilter(r.team, team); });
    }
    var limit = limitVal === 'all' ? allData.length : parseInt(limitVal);
    allData = allData.slice(0, limit);

    var seasonLabel = years.length === 1 ? String(years[0]) : years[0] + '\u2013' + years[years.length-1];
    var title = seasonLabel + ' Ladder' + (team !== 'all' ? ' - ' + team : '') + ' (' + allData.length + ' rows)';
    renderFinderResults(allData, title);
    saveFinderToHistory(title, allData);
}

async function runTeamResults(team, matchType, limitVal) {
    var opponent = document.getElementById('tf-opponent').value;
    var venue = document.querySelector('input[name="tf-venue"]:checked').value;
    var roundFrom = parseInt(document.getElementById('tf-round-from').value) || 0;
    var roundTo = parseInt(document.getElementById('tf-round-to').value) || 999;
    var groundFilter = getGroundFilter();
    var stateFilter = getStateFilter();
    var years = getTeamYears();

    var allGames = [];
    for (var i = 0; i < years.length; i++) {
        var games = await fetchSquiggle('games', {year: years[i]});
        if (games && games.length) {
            games.forEach(function(g) { g._year = years[i]; });
            allGames = allGames.concat(games);
        }
    }
    if (!allGames.length) { renderFinderResults(null, 'No games data found'); return; }

    var completed = allGames.filter(function(g) { return g.complete === 100; });

    // Apply filters
    var filtered = completed.filter(function(g) {
        if (matchType === 'finals' && !g.is_final) return false;
        if (matchType === 'ha' && g.is_final) return false;
        if (!g.is_final && roundFrom > 0 && (g.round || 0) < roundFrom) return false;
        if (!g.is_final && roundTo < 999 && (g.round || 0) > roundTo) return false;
        if (!matchesGround(g.venue, groundFilter)) return false;
        if (!matchesState(g.venue, stateFilter)) return false;
        if (team !== 'all') {
            var isHome = teamMatchesFilter(g.hteam || '', team);
            var isAway = teamMatchesFilter(g.ateam || '', team);
            if (!isHome && !isAway) return false;
            if (venue === 'home' && !isHome) return false;
            if (venue === 'away' && !isAway) return false;
        }
        if (opponent !== 'all') {
            var oppHome = teamMatchesFilter(g.hteam || '', opponent);
            var oppAway = teamMatchesFilter(g.ateam || '', opponent);
            if (!oppHome && !oppAway) return false;
        }
        return true;
    });

    filtered.sort(function(a,b){
        var yd = (a._year||0)-(b._year||0); if (yd) return yd;
        return (a.round||0)-(b.round||0);
    });

    var data = filtered.map(function(g) {
        var row = {
            round: g.round, type: g.is_final ? 'Final' : 'H&A',
            ground: g.venue || '',
            home: g.hteam, home_score: (g.hgoals||0)+'.'+(g.hbehinds||0)+' ('+g.hscore+')',
            away: g.ateam, away_score: (g.agoals||0)+'.'+(g.abehinds||0)+' ('+g.ascore+')',
            winner: g.winner || '', margin: Math.abs((g.hscore||0)-(g.ascore||0)),
            date: String(g.date||'').slice(0,10)
        };
        if (years.length > 1) row.season = g._year;
        return row;
    });

    var limit = limitVal === 'all' ? data.length : parseInt(limitVal);
    data = data.slice(0, limit);

    var seasonLabel = years.length === 1 ? String(years[0]) : years[0] + '\u2013' + years[years.length-1];
    var title = seasonLabel + ' Match Results';
    var parts = [];
    if (team !== 'all') parts.push(team);
    if (opponent !== 'all') parts.push('vs ' + opponent);
    if (matchType !== 'all') parts.push(matchType === 'finals' ? 'Finals' : 'H&A');
    if (groundFilter) parts.push('at ' + groundFilter);
    if (stateFilter) parts.push('in ' + stateFilter);
    if (parts.length) title += ': ' + parts.join(', ');
    title += ' (' + data.length + ' matches)';

    renderFinderResults(data, title);
    saveFinderToHistory(title, data);
}

async function runTeamSummary(team, matchType, limitVal) {
    var groundFilter = getGroundFilter();
    var stateFilter = getStateFilter();
    var years = getTeamYears();

    var allGames = [];
    for (var i = 0; i < years.length; i++) {
        var games = await fetchSquiggle('games', {year: years[i]});
        if (games && games.length) allGames = allGames.concat(games);
    }
    if (!allGames.length) { renderFinderResults(null, 'No games data found'); return; }

    var completed = allGames.filter(function(g) {
        if (g.complete !== 100) return false;
        if (matchType === 'finals' && !g.is_final) return false;
        if (matchType === 'ha' && g.is_final) return false;
        if (!matchesGround(g.venue, groundFilter)) return false;
        if (!matchesState(g.venue, stateFilter)) return false;
        return true;
    });

    var teamAgg = {};
    completed.forEach(function(g) {
        var ht = g.hteam, at = g.ateam;
        if (!teamAgg[ht]) teamAgg[ht] = {goals_for:0, goals_against:0, behinds_for:0, behinds_against:0, points_for:0, points_against:0, games:0, wins:0, losses:0, draws:0};
        if (!teamAgg[at]) teamAgg[at] = {goals_for:0, goals_against:0, behinds_for:0, behinds_against:0, points_for:0, points_against:0, games:0, wins:0, losses:0, draws:0};
        teamAgg[ht].goals_for += (g.hgoals||0); teamAgg[ht].goals_against += (g.agoals||0);
        teamAgg[ht].behinds_for += (g.hbehinds||0); teamAgg[ht].behinds_against += (g.abehinds||0);
        teamAgg[ht].points_for += (g.hscore||0); teamAgg[ht].points_against += (g.ascore||0);
        teamAgg[ht].games += 1;
        if ((g.hscore||0) > (g.ascore||0)) teamAgg[ht].wins += 1;
        else if ((g.hscore||0) < (g.ascore||0)) teamAgg[ht].losses += 1;
        else teamAgg[ht].draws += 1;
        teamAgg[at].goals_for += (g.agoals||0); teamAgg[at].goals_against += (g.hgoals||0);
        teamAgg[at].behinds_for += (g.abehinds||0); teamAgg[at].behinds_against += (g.hbehinds||0);
        teamAgg[at].points_for += (g.ascore||0); teamAgg[at].points_against += (g.hscore||0);
        teamAgg[at].games += 1;
        if ((g.ascore||0) > (g.hscore||0)) teamAgg[at].wins += 1;
        else if ((g.ascore||0) < (g.hscore||0)) teamAgg[at].losses += 1;
        else teamAgg[at].draws += 1;
    });

    var data = Object.keys(teamAgg).map(function(t) {
        var a = teamAgg[t];
        return {
            team: t, games: a.games, wins: a.wins, losses: a.losses, draws: a.draws,
            win_pct: Math.round(a.wins / a.games * 1000) / 10,
            goals_for: a.goals_for, goals_against: a.goals_against,
            behinds_for: a.behinds_for,
            points_for: a.points_for, points_against: a.points_against,
            avg_goals_per_game: Math.round(a.goals_for / a.games * 100) / 100,
            avg_points_per_game: Math.round(a.points_for / a.games * 100) / 100
        };
    });
    data.sort(function(a,b){ return b.win_pct - a.win_pct || b.points_for - a.points_for; });

    if (team !== 'all') {
        data = data.filter(function(r){ return teamMatchesFilter(r.team, team); });
    }
    var limit = limitVal === 'all' ? data.length : parseInt(limitVal);
    data = data.slice(0, limit);

    var seasonLabel = years.length === 1 ? String(years[0]) : years[0] + '\u2013' + years[years.length-1];
    var title = seasonLabel + ' Season Summary';
    if (team !== 'all') title += ': ' + team;
    var qualifiers = [];
    if (matchType !== 'all') qualifiers.push(matchType === 'finals' ? 'Finals' : 'H&A');
    if (groundFilter) qualifiers.push('at ' + groundFilter);
    if (stateFilter) qualifiers.push('in ' + stateFilter);
    if (qualifiers.length) title += ' (' + qualifiers.join(', ') + ')';
    title += ' (' + data.length + ' teams)';

    renderFinderResults(data, title);
    saveFinderToHistory(title, data);
}

function renderFinderResults(data, title) {
    var el = document.getElementById('finder-results');
    if (!data || !data.length) {
        el.innerHTML = '<div class="mt-4 bg-amber-50 dark:bg-amber-900/20 border border-amber-200 dark:border-amber-800/30 rounded-2xl p-5 fade-in"><p class="text-sm text-amber-700 dark:text-amber-400 font-medium">' + escapeHtml(title || 'No results found.') + '</p></div>';
        el.classList.remove('hidden');
        return;
    }
    var html = '<div class="mt-4 result-card bg-white dark:bg-[#141827] border border-gray-200 dark:border-gray-700/60 rounded-2xl shadow-sm overflow-hidden fade-in">';
    // Title
    html += '<div class="px-6 pt-5 pb-3"><p class="text-[15px] text-gray-700 dark:text-gray-300 leading-relaxed font-semibold">' + escapeHtml(title) + '</p></div>';
    // View toggles
    html += '<div class="mx-6 mb-5">';
    html += '<div class="flex items-center gap-1 mb-3 flex-wrap">';
    html += '<button onclick="showView(\'table\',this)" class="view-btn active-view px-2.5 py-1 text-[11px] rounded-lg transition-all flex items-center gap-1"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M3 14h18M3 6h18M3 18h18"/></svg>Table</button>';
    html += '<button onclick="showView(\'bar\',this)" class="view-btn px-2.5 py-1 text-[11px] rounded-lg transition-all flex items-center gap-1"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>Bar</button>';
    html += '<button onclick="showView(\'column\',this)" class="view-btn px-2.5 py-1 text-[11px] rounded-lg transition-all flex items-center gap-1"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"/></svg>Column</button>';
    html += '<button onclick="exportCSV()" class="view-btn px-2.5 py-1 text-[11px] rounded-lg transition-all flex items-center gap-1" title="Export as CSV"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>Export</button>';
    html += '</div>';
    // Table
    html += '<div id="view-table" class="rounded-xl overflow-hidden border border-gray-100 dark:border-gray-700/40"><div class="overflow-x-auto" id="table-scroll"></div></div>';
    // Chart
    html += '<div id="view-chart" class="hidden border border-gray-100 dark:border-gray-700/40 rounded-xl p-4 bg-white dark:bg-transparent" style="min-height:300px"><canvas id="results-chart"></canvas></div>';
    html += '</div>';
    // Footer
    html += '<div class="px-6 py-3 border-t border-gray-100 dark:border-gray-700/30 flex items-center justify-between bg-gray-50/50 dark:bg-white/[0.01]">';
    html += '<span class="text-[11px] text-gray-500 dark:text-gray-400 font-medium">Stat Finder</span>';
    html += '<span class="text-[11px] text-gray-500 dark:text-gray-400 font-medium">' + data.length + ' rows</span>';
    html += '</div>';
    html += '</div>';

    el.innerHTML = html;
    el.classList.remove('hidden');

    window._chartData = data;
    window._chartInstance = null;
    window._sortCol = null;
    window._sortDir = 'asc';
    rebuildTable();
}

function saveFinderToHistory(title, data) {
    if (!data || !data.length) return;
    var hist = loadHistory();
    hist.unshift({
        query: title,
        answer: 'Found ' + data.length + ' results',
        data: data,
        r_code: null,
        provider: 'stat-finder',
        ts: Date.now()
    });
    if (hist.length > HISTORY_MAX) hist = hist.slice(0, HISTORY_MAX);
    try { localStorage.setItem(HISTORY_KEY, JSON.stringify(hist)); } catch(e) {}
    updateHistoryBadge();
}

// ── Search handler ──
async function handleSearch(e) {
    if (e) e.preventDefault();
    var query = document.getElementById('query-input').value.trim();
    if (!query) return;

    var provider = getProvider(), apiKey = getApiKey();
    if (!apiKey) {
        renderResults({error:'No API key set. Click the AI selector and paste your '+PROVIDERS[provider].short+' key.'}, provider);
        return;
    }

    document.getElementById('search-btn').style.display = 'none';
    var spinner = document.getElementById('search-spinner');
    spinner.style.display = 'flex';
    document.getElementById('results').innerHTML = '';

    try {
        var liveData = await fetchLiveContext(query);
        var prompt = buildPrompt(query, liveData);
        var result;
        if (provider === 'gemini') result = await callGemini(prompt, apiKey);
        else if (provider === 'groq') result = await callGroq(prompt, apiKey);
        else if (provider === 'openai') result = await callOpenAI(prompt, apiKey);
        else if (provider === 'claude') result = await callClaude(prompt, apiKey);
        else result = {error:'Unknown provider'};
        renderResults(result, provider);
        saveToHistory(query, result, provider);
    } catch(err) {
        renderResults({error: err.message || 'Something went wrong. Please try again.'}, provider);
    } finally {
        document.getElementById('search-btn').style.display = '';
        spinner.style.display = 'none';
    }
}
// Init history badge on load
updateHistoryBadge();
