<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AFL Stats Search</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'] },
                    colors: { brand: { 50: '#eff6ff', 100: '#dbeafe', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8' } }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <!-- Apply dark mode immediately to prevent flash -->
    <script>
        if (localStorage.getItem('afl_theme') === 'dark' || (!localStorage.getItem('afl_theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }
    </script>
    <style>
        .htmx-indicator { display: none; }
        .htmx-request .htmx-indicator { display: flex; }
        .htmx-request .hide-on-request { display: none; }
        .dropdown-enter { animation: dropIn 0.15s ease-out; }
        @keyframes dropIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .usage-bar { transition: width 0.4s ease-out; }
    </style>
</head>
<body class="bg-[#f8f9fb] dark:bg-[#0c0d12] min-h-screen font-sans transition-colors duration-200">

    <div class="max-w-2xl mx-auto px-5 pt-14 pb-12">

        <!-- Top bar: dark mode toggle -->
        <div class="flex justify-end mb-6">
            <button onclick="toggleTheme()" id="theme-toggle" class="p-2 rounded-lg text-gray-400 dark:text-gray-500 hover:bg-gray-200/50 dark:hover:bg-white/5 transition-colors" title="Toggle dark mode">
                <svg id="icon-sun" class="w-4 h-4 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
                <svg id="icon-moon" class="w-4 h-4 block dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
            </button>
        </div>

        <!-- Header -->
        <div class="text-center mb-10">
            <h1 class="text-3xl font-bold text-gray-900 dark:text-gray-100 tracking-tight">AFL Stats Search</h1>
            <p class="text-gray-400 dark:text-gray-500 mt-1.5 text-sm">Natural language search for AFL statistics</p>
        </div>

        <!-- Search -->
        <form hx-post="/search" hx-target="#results" hx-indicator="#search-area" id="search-area"
              hx-vals="js:{provider: getProvider(), api_key: getApiKey()}" class="mb-4">
            <div class="relative">
                <input type="text" name="query" id="query-input"
                    class="w-full pl-4 pr-24 py-3.5 bg-white dark:bg-[#1a1b23] border border-gray-200 dark:border-gray-700/60 rounded-xl text-[15px] text-gray-800 dark:text-gray-200 placeholder-gray-400 dark:placeholder-gray-500 shadow-sm focus:outline-none focus:ring-2 focus:ring-brand-500/30 focus:border-brand-500 transition-all"
                    placeholder="Ask anything about AFL stats..."
                    required autofocus>
                <button type="submit"
                    class="absolute right-1.5 top-1.5 bottom-1.5 px-5 bg-brand-600 text-white text-sm font-medium rounded-lg hover:bg-brand-700 transition-colors hide-on-request">
                    Search
                </button>
                <div class="htmx-indicator absolute right-1.5 top-1.5 bottom-1.5 px-5 bg-brand-600 text-white text-sm font-medium rounded-lg items-center gap-2">
                    <svg class="animate-spin h-4 w-4" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>
                    Searching
                </div>
            </div>
        </form>

        <!-- Sub-bar -->
        <div class="flex items-center justify-between mb-8">
            <div class="relative">
                <button onclick="toggleAIPanel()" id="ai-toggle"
                    class="inline-flex items-center gap-1.5 text-xs text-gray-400 dark:text-gray-500 hover:text-gray-600 dark:hover:text-gray-300 transition-colors">
                    <span class="w-1.5 h-1.5 rounded-full" id="ai-status-dot"></span>
                    <span id="ai-status-label"></span>
                    <span id="usage-badge" class="text-gray-300 dark:text-gray-600"></span>
                    <svg class="w-3 h-3 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
                </button>

                <!-- Dropdown -->
                <div id="ai-panel" class="hidden absolute left-0 top-full mt-2 w-80 bg-white dark:bg-[#1a1b23] border border-gray-200 dark:border-gray-700/60 rounded-xl shadow-lg dark:shadow-black/40 z-50 dropdown-enter">
                    <div class="p-3 pb-0">
                        <div class="grid grid-cols-3 gap-1.5 mb-3">
                            {% for key, p in providers.items() %}
                            <button onclick="selectProvider('{{ key }}')" id="provider-btn-{{ key }}"
                                class="provider-btn px-2 py-2 text-xs rounded-lg border dark:border-gray-700/60 transition-all text-center">
                                <div class="font-medium">{{ p.name.split(' ')[0] }}</div>
                                <div class="text-[10px] text-gray-400 dark:text-gray-500 mt-0.5" id="provider-usage-{{ key }}"></div>
                            </button>
                            {% endfor %}
                        </div>
                        <div class="relative">
                            <input type="password" id="api-key-input"
                                class="w-full pl-3 pr-8 py-2 border border-gray-200 dark:border-gray-700/60 rounded-lg text-xs bg-gray-50 dark:bg-[#12131a] text-gray-800 dark:text-gray-200 focus:ring-2 focus:ring-brand-500/30 focus:border-brand-500 transition-all"
                                placeholder="Paste API key">
                            <button onclick="toggleKeyVisibility()" class="absolute right-2 top-1/2 -translate-y-1/2 text-gray-300 dark:text-gray-600 hover:text-gray-500 dark:hover:text-gray-400">
                                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                            </button>
                        </div>
                        <div class="flex items-center justify-between mt-2 mb-3">
                            <a id="signup-link" href="#" target="_blank" class="text-[10px] text-brand-600 hover:underline">Get a free key</a>
                        </div>
                    </div>
                    <!-- Usage -->
                    <div class="border-t border-gray-100 dark:border-gray-700/40 p-3">
                        <div class="flex items-center justify-between mb-2">
                            <span class="text-[11px] font-medium text-gray-500 dark:text-gray-400">Today's usage</span>
                            <span id="reset-timer" class="text-[10px] text-gray-400 dark:text-gray-500"></span>
                        </div>
                        <div class="mb-2">
                            <div class="flex items-center justify-between mb-0.5">
                                <span class="text-[10px] text-gray-400 dark:text-gray-500">Requests</span>
                                <span id="req-count" class="text-[10px] text-gray-500 dark:text-gray-400 font-medium"></span>
                            </div>
                            <div class="h-1.5 bg-gray-100 dark:bg-gray-800 rounded-full overflow-hidden">
                                <div id="req-bar" class="usage-bar h-full rounded-full" style="width:0%"></div>
                            </div>
                        </div>
                        <div class="mb-2">
                            <div class="flex items-center justify-between mb-0.5">
                                <span class="text-[10px] text-gray-400 dark:text-gray-500">Tokens</span>
                                <span id="tok-count" class="text-[10px] text-gray-500 dark:text-gray-400 font-medium"></span>
                            </div>
                            <div class="h-1.5 bg-gray-100 dark:bg-gray-800 rounded-full overflow-hidden">
                                <div id="tok-bar" class="usage-bar h-full rounded-full" style="width:0%"></div>
                            </div>
                        </div>
                        <div class="flex items-center justify-between mt-2">
                            <span id="tier-label" class="text-[10px] text-gray-300 dark:text-gray-600"></span>
                            <button onclick="resetUsage()" class="text-[10px] text-gray-300 dark:text-gray-600 hover:text-red-400 transition-colors">Reset</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="flex flex-wrap gap-1.5 justify-end">
                <button onclick="submitQuery(this)" class="text-[11px] text-gray-400 dark:text-gray-500 hover:text-brand-600 dark:hover:text-brand-500 hover:bg-brand-50 dark:hover:bg-brand-500/10 px-2 py-1 rounded-md transition-colors">Grand Final winners</button>
                <button onclick="submitQuery(this)" class="text-[11px] text-gray-400 dark:text-gray-500 hover:text-brand-600 dark:hover:text-brand-500 hover:bg-brand-50 dark:hover:bg-brand-500/10 px-2 py-1 rounded-md transition-colors">Top goal kickers 2025</button>
                <button onclick="submitQuery(this)" class="text-[11px] text-gray-400 dark:text-gray-500 hover:text-brand-600 dark:hover:text-brand-500 hover:bg-brand-50 dark:hover:bg-brand-500/10 px-2 py-1 rounded-md transition-colors">2025 ladder</button>
            </div>
        </div>

        <!-- Tabs -->
        <div class="flex items-center gap-1 mb-4" id="main-tabs">
            <button onclick="showTab('search')" id="tab-search" class="tab-btn px-3 py-1.5 text-xs font-semibold rounded-lg transition-all text-brand-600 dark:text-brand-500 bg-brand-50 dark:bg-brand-500/10">
                <svg class="w-3 h-3 inline -mt-0.5 mr-0.5" fill="currentColor" viewBox="0 0 20 20"><path d="M10 1l2.39 6.17H19l-5.3 3.86L15.78 17 10 13.27 4.22 17l2.08-5.97L1 7.17h6.61z"/></svg>Ask AI
            </button>
            <button onclick="showTab('finder')" id="tab-finder" class="tab-btn px-3 py-1.5 text-xs font-semibold rounded-lg transition-all text-gray-400 dark:text-gray-500 hover:bg-gray-100 dark:hover:bg-white/[0.04]">
                <svg class="w-3 h-3 inline -mt-0.5 mr-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z"/></svg>Stat Finder
            </button>
            <button onclick="showTab('history')" id="tab-history" class="tab-btn px-3 py-1.5 text-xs font-semibold rounded-lg transition-all text-gray-400 dark:text-gray-500 hover:bg-gray-100 dark:hover:bg-white/[0.04]">History <span id="history-badge" class="text-[10px] ml-1 px-1.5 py-0.5 rounded-full bg-gray-200 dark:bg-gray-700 text-gray-600 dark:text-gray-300 hidden">0</span></button>
        </div>

        <div id="results"></div>
        <div id="finder-view" class="hidden"></div>
        <div id="finder-results" class="hidden"></div>
        <div id="history-view" class="hidden"></div>
    </div>

    <style>
        .tab-btn { cursor: pointer; border: none; }
        .finder-form { background: white; border: 1px solid #e5e7eb; border-radius: 0.75rem; padding: 1rem; }
        .dark .finder-form { background: #1a1b23; border-color: rgba(55,65,81,0.6); }
        .finder-label { display: block; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: #6b7280; margin-bottom: 0.375rem; }
        .dark .finder-label { color: #9ca3af; }
        .finder-input, .finder-select {
            width: 100%; padding: 0.5rem 0.75rem; border: 1px solid #d1d5db; border-radius: 0.5rem;
            font-size: 13px; background: #f9fafb; color: #1f2937; outline: none; transition: border-color 0.15s;
        }
        .finder-input:focus, .finder-select:focus { border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59,130,246,0.15); }
        .dark .finder-input, .dark .finder-select { background: #12131a; border-color: rgba(55,65,81,0.6); color: #e5e7eb; }
        .finder-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
        .finder-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.75rem; }
        @media (max-width: 480px) { .finder-grid, .finder-grid-3 { grid-template-columns: 1fr; } }
        .finder-section { margin-bottom: 0.875rem; }
        .finder-pill { display: inline-flex; align-items: center; padding: 0.375rem 0.875rem; border-radius: 9999px; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.15s; border: 2px solid #d1d5db; background: transparent; color: #6b7280; }
        .finder-pill.active { border-color: #3b82f6; background: rgba(59,130,246,0.1); color: #3b82f6; }
        .dark .finder-pill { border-color: rgba(55,65,81,0.6); color: #9ca3af; }
        .dark .finder-pill.active { border-color: #60a5fa; background: rgba(96,165,250,0.15); color: #60a5fa; }
        .finder-checkbox { display: inline-flex; align-items: center; gap: 0.25rem; font-size: 12px; color: #374151; cursor: pointer; margin-right: 0.5rem; margin-bottom: 0.25rem; }
        .dark .finder-checkbox { color: #d1d5db; }
        .finder-checkbox input { accent-color: #3b82f6; }
        .finder-btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem;
            padding: 0.625rem 1.5rem; border-radius: 0.75rem; font-size: 14px; font-weight: 700;
            background: #2563eb; color: white; border: none; cursor: pointer; transition: all 0.15s; width: 100%;
        }
        .finder-btn:hover { background: #1d4ed8; }
        .finder-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .finder-spinner { display: none; }
        .finder-btn.loading .finder-spinner { display: inline-block; }
        .finder-btn.loading .finder-btn-text { display: none; }
        .result-card { border-left: 4px solid #3b82f6; }
        .view-btn { color: #6b7280; cursor: pointer; border: none; background: none; }
        .view-btn:hover { background: rgba(59,130,246,0.08); color: #3b82f6; }
        .active-view { background: rgba(59,130,246,0.1) !important; color: #2563eb !important; font-weight: 600; }
        .dark .active-view { background: rgba(96,165,250,0.15) !important; color: #60a5fa !important; }
        .sort-header { cursor: pointer; user-select: none; }
        .sort-header:hover { background: rgba(255,255,255,0.1); }
        .sort-arrow { font-size: 9px; margin-left: 3px; opacity: 0.5; }
        .sort-arrow.active { opacity: 1; }
        .table-header-row { background: linear-gradient(90deg, #1e3a5f, #2563eb); }
        .dark .table-header-row { background: linear-gradient(90deg, #1a1b23, #1e3a5f); }
    </style>

    <script>
        document.addEventListener('click', function(e) {
            var panel = document.getElementById('ai-panel');
            var toggle = document.getElementById('ai-toggle');
            if (!panel.contains(e.target) && !toggle.contains(e.target)) panel.classList.add('hidden');
        });
    </script>

    <script>
        // Theme
        function toggleTheme() {
            var html = document.documentElement;
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                localStorage.setItem('afl_theme', 'light');
            } else {
                html.classList.add('dark');
                localStorage.setItem('afl_theme', 'dark');
            }
        }

        // Provider config
        var signupUrls = { {% for key, p in providers.items() %}'{{ key }}':'{{ p.signup }}',{% endfor %} };
        var providerNames = { {% for key, p in providers.items() %}'{{ key }}':'{{ p.name }}',{% endfor %} };
        var providerShort = { 'gemini':'Gemini', 'openai':'ChatGPT', 'anthropic':'Claude' };
        var providerColors = { 'gemini':'#4285F4', 'openai':'#10A37F', 'anthropic':'#D97757' };
        var providerLimits = {
            'gemini':    { requests: 1500, tokens: 1000000, resetTZ: 'America/Los_Angeles', label: 'Free tier \u00B7 resets midnight PT' },
            'openai':    { requests: 500,  tokens: 200000,  resetTZ: 'UTC',                 label: 'Free tier \u00B7 resets midnight UTC' },
            'anthropic': { requests: 1000, tokens: 300000,  resetTZ: 'UTC',                 label: 'Free tier \u00B7 resets midnight UTC' }
        };

        function todayStr() { return new Date().toISOString().slice(0, 10); }
        function getProvider() { return localStorage.getItem('afl_provider') || 'gemini'; }
        function getApiKey() { return localStorage.getItem('afl_key_' + getProvider()) || ''; }
        function getUsage(p) {
            var raw = JSON.parse(localStorage.getItem('afl_usage_' + p) || '{}');
            return (raw.date === todayStr()) ? raw : { queries: 0, total_tokens: 0, date: todayStr() };
        }
        function saveUsage(p, u) { u.date = todayStr(); localStorage.setItem('afl_usage_' + p, JSON.stringify(u)); }
        function recordUsage(provider, tokens) {
            var u = getUsage(provider); u.queries += 1; u.total_tokens += tokens || 0;
            saveUsage(provider, u); updateUI();
        }
        function formatTokens(n) {
            if (n >= 1000000) return (n/1000000).toFixed(1) + 'M';
            if (n >= 1000) return (n/1000).toFixed(1) + 'k';
            return n.toString();
        }
        function getResetMs(tz) {
            var now = new Date();
            var parts = {};
            new Intl.DateTimeFormat('en-US', { timeZone: tz, hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false }).formatToParts(now).forEach(function(p) { parts[p.type] = p.value; });
            return (86400 - ((parseInt(parts.hour)||0)*3600 + (parseInt(parts.minute)||0)*60 + (parseInt(parts.second)||0))) * 1000;
        }
        function formatCountdown(ms) {
            var h = Math.floor(ms/3600000), m = Math.floor((ms%3600000)/60000);
            return h > 0 ? 'Resets in ' + h + 'h ' + m + 'm' : 'Resets in ' + m + 'm';
        }
        function barColor(pct) { return pct > 90 ? '#ef4444' : pct > 70 ? '#f59e0b' : '#3b82f6'; }

        function selectProvider(p) {
            localStorage.setItem('afl_provider', p);
            document.getElementById('api-key-input').value = localStorage.getItem('afl_key_' + p) || '';
            updateUI();
        }
        function toggleAIPanel() { document.getElementById('ai-panel').classList.toggle('hidden'); }
        function toggleKeyVisibility() { var el = document.getElementById('api-key-input'); el.type = el.type === 'password' ? 'text' : 'password'; }
        function resetUsage() { localStorage.removeItem('afl_usage_' + getProvider()); updateUI(); }

        function updateUI() {
            var cur = getProvider(), color = providerColors[cur], hasKey = !!getApiKey();
            var usage = getUsage(cur), limits = providerLimits[cur];

            document.getElementById('ai-status-dot').style.backgroundColor = hasKey ? color : '#6b7280';
            document.getElementById('ai-status-label').textContent = providerShort[cur];
            document.getElementById('usage-badge').textContent = usage.queries > 0 ? '\u00B7 ' + usage.queries + '/' + limits.requests + ' today' : '';

            document.querySelectorAll('.provider-btn').forEach(function(btn) {
                var id = btn.id.replace('provider-btn-', ''), c = providerColors[id];
                if (id === cur) { btn.style.borderColor = c; btn.style.backgroundColor = c + '12'; btn.style.color = c; }
                else { btn.style.borderColor = ''; btn.style.backgroundColor = ''; btn.style.color = ''; }
                var u = getUsage(id), uel = document.getElementById('provider-usage-' + id);
                if (uel) uel.textContent = u.queries > 0 ? u.queries + ' today' : '';
            });

            document.getElementById('signup-link').href = signupUrls[cur];
            document.getElementById('signup-link').textContent = 'Get a free ' + providerShort[cur] + ' key';

            var rPct = Math.min(100, (usage.queries / limits.requests) * 100);
            var tPct = Math.min(100, (usage.total_tokens / limits.tokens) * 100);
            document.getElementById('req-count').textContent = usage.queries + ' / ' + limits.requests.toLocaleString();
            document.getElementById('req-bar').style.width = rPct + '%';
            document.getElementById('req-bar').style.backgroundColor = barColor(rPct);
            document.getElementById('tok-count').textContent = formatTokens(usage.total_tokens) + ' / ' + formatTokens(limits.tokens);
            document.getElementById('tok-bar').style.width = tPct + '%';
            document.getElementById('tok-bar').style.backgroundColor = barColor(tPct);
            document.getElementById('reset-timer').textContent = formatCountdown(getResetMs(limits.resetTZ));
            document.getElementById('tier-label').textContent = limits.label;
        }
        function updateStatusBar() { updateUI(); }
        function submitQuery(btn) { var i = document.getElementById('query-input'); i.value = btn.textContent.trim(); i.closest('form').requestSubmit(); }

        setInterval(function() {
            var el = document.getElementById('reset-timer');
            if (el) el.textContent = formatCountdown(getResetMs(providerLimits[getProvider()].resetTZ));
        }, 60000);

        document.getElementById('api-key-input').addEventListener('input', function() {
            localStorage.setItem('afl_key_' + getProvider(), this.value.trim()); updateUI();
        });
        updateUI();
        var sk = getApiKey(); if (sk) document.getElementById('api-key-input').value = sk;

        // ── Stat Finder ──
        var AFL_TEAMS = ['Adelaide','Brisbane Lions','Carlton','Collingwood','Essendon','Fremantle','Geelong','Gold Coast','GWS Giants','Greater Western Sydney','Hawthorn','Melbourne','North Melbourne','Port Adelaide','Richmond','St Kilda','Sydney','West Coast','Western Bulldogs'];
        var AFL_TEAMS_DISPLAY = AFL_TEAMS.filter(function(t){ return t !== 'Greater Western Sydney'; });
        var AFL_GROUNDS = ['M.C.G.','Marvel Stadium','Adelaide Oval','Optus Stadium','Gabba','S.C.G.','GIANTS Stadium','GMHBA Stadium','Blundstone Arena','University of Tasmania Stadium','Manuka Oval','Mars Stadium','TIO Stadium','TIO Traeger Park','People First Stadium','Heritage Bank Stadium','Norwood Oval'];
        var GROUND_STATES = {'M.C.G.':'VIC','Marvel Stadium':'VIC','GMHBA Stadium':'VIC','Mars Stadium':'VIC','Adelaide Oval':'SA','Norwood Oval':'SA','Optus Stadium':'WA','Gabba':'QLD','People First Stadium':'QLD','Heritage Bank Stadium':'QLD','S.C.G.':'NSW','GIANTS Stadium':'NSW','Blundstone Arena':'TAS','University of Tasmania Stadium':'TAS','TIO Stadium':'NT','TIO Traeger Park':'NT','Manuka Oval':'ACT'};
        var AFL_STATES = ['VIC','SA','WA','QLD','NSW','TAS','NT','ACT'];
        var PLAYER_STATS = ['games','goals','kicks','marks','handballs','disposals','tackles','behinds'];
        var SQUIGGLE = 'https://api.squiggle.com.au/';
        var _finderMode = 'player';
        var _teamViewType = 'ladder';
        var _playerStatsCache = null;

        async function fetchSquiggle(endpoint, params) {

                if(!allGames.length){renderFinderResults(null,'No games found');return;}
                var ta={}; allGames.filter(function(g){if(g.complete!==100)return false; if(matchType==='finals'&&!g.is_final)return false; if(matchType==='ha'&&g.is_final)return false; if(!matchesGround(g.venue,gf))return false; if(!matchesState(g.venue,sf))return false; return true;}).forEach(function(g){var h=g.hteam,a=g.ateam; if(!ta[h])ta[h]={gf:0,ga:0,bf:0,pf:0,pa:0,gm:0,w:0,l:0,d:0}; if(!ta[a])ta[a]={gf:0,ga:0,bf:0,pf:0,pa:0,gm:0,w:0,l:0,d:0}; ta[h].gf+=(g.hgoals||0);ta[h].ga+=(g.agoals||0);ta[h].bf+=(g.hbehinds||0);ta[h].pf+=(g.hscore||0);ta[h].pa+=(g.ascore||0);ta[h].gm+=1;if((g.hscore||0)>(g.ascore||0))ta[h].w+=1;else if((g.hscore||0)<(g.ascore||0))ta[h].l+=1;else ta[h].d+=1; ta[a].gf+=(g.agoals||0);ta[a].ga+=(g.hgoals||0);ta[a].bf+=(g.abehinds||0);ta[a].pf+=(g.ascore||0);ta[a].pa+=(g.hscore||0);ta[a].gm+=1;if((g.ascore||0)>(g.hscore||0))ta[a].w+=1;else if((g.ascore||0)<(g.hscore||0))ta[a].l+=1;else ta[a].d+=1;});
                var data=Object.keys(ta).map(function(t){var a=ta[t];return{team:t,games:a.gm,wins:a.w,losses:a.l,draws:a.d,win_pct:Math.round(a.w/a.gm*1000)/10,goals_for:a.gf,goals_against:a.ga,behinds_for:a.bf,points_for:a.pf,points_against:a.pa,avg_goals_per_game:Math.round(a.gf/a.gm*100)/100,avg_points_per_game:Math.round(a.pf/a.gm*100)/100};}).sort(function(a,b){return b.win_pct-a.win_pct||b.points_for-a.points_for;});
                if(team!=='all')data=data.filter(function(r){return teamMatchesFilter(r.team,team);});
                var lim=limitVal==='all'?data.length:parseInt(limitVal); data=data.slice(0,lim);
                var sl=years.length===1?String(years[0]):years[0]+'\u2013'+years[years.length-1];
                var quals=[]; if(matchType!=='all')quals.push(matchType==='finals'?'Finals':'H&A'); if(gf)quals.push('at '+gf); if(sf)quals.push('in '+sf);
                var title=sl+' Season Summary'+(team!=='all'?': '+team:'')+(quals.length?' ('+quals.join(', ')+')':'')+' ('+data.length+' teams)';
                renderFinderResults(data,title); saveFinderToHistory(title,data);
            }
        }

        window._chartData=null; window._chartInstance=null; window._sortCol=null; window._sortDir='asc';

        function renderFinderResults(data,title) {
            var el=document.getElementById('finder-results');
            if(!data||!data.length){el.innerHTML='<div class="mt-4 bg-amber-50 dark:bg-amber-900/20 border border-amber-200 dark:border-amber-800/30 rounded-xl p-4 fade-in"><p class="text-sm text-amber-700 dark:text-amber-400">'+escapeHtml(title||'No results.')+'</p></div>';el.classList.remove('hidden');return;}
            var html='<div class="mt-4 result-card bg-white dark:bg-[#1a1b23] border border-gray-200 dark:border-gray-700/60 rounded-xl shadow-sm overflow-hidden fade-in">';
            html+='<div class="px-5 pt-4 pb-3"><p class="text-sm text-gray-700 dark:text-gray-300 font-semibold">'+escapeHtml(title)+'</p></div>';
            html+='<div class="mx-5 mb-4"><div class="flex items-center gap-1 mb-2 flex-wrap">';
            html+='<button onclick="showView(\'table\',this)" class="view-btn active-view px-2 py-1 text-[11px] rounded-md flex items-center gap-1">Table</button>';
            html+='<button onclick="showView(\'bar\',this)" class="view-btn px-2 py-1 text-[11px] rounded-md flex items-center gap-1">Bar</button>';
            html+='<button onclick="showView(\'column\',this)" class="view-btn px-2 py-1 text-[11px] rounded-md flex items-center gap-1">Column</button>';
            html+='<button onclick="exportCSV()" class="view-btn px-2 py-1 text-[11px] rounded-md flex items-center gap-1">Export</button>';
            html+='</div>';
            html+='<div id="view-table" class="rounded-lg overflow-hidden border border-gray-100 dark:border-gray-700/40"><div class="overflow-x-auto" id="table-scroll"></div></div>';
            html+='<div id="view-chart" class="hidden border border-gray-100 dark:border-gray-700/40 rounded-lg p-4 bg-white dark:bg-transparent" style="min-height:300px"><canvas id="results-chart"></canvas></div>';
            html+='</div>';
            html+='<div class="px-5 py-2 border-t border-gray-100 dark:border-gray-700/30 flex items-center justify-between"><span class="text-[10px] text-gray-400">Stat Finder</span><span class="text-[10px] text-gray-400">'+data.length+' rows</span></div>';
            html+='</div>';
            el.innerHTML=html; el.classList.remove('hidden');
            window._chartData=data; window._chartInstance=null; window._sortCol=null; window._sortDir='asc';
            rebuildTable();
        }

        function rebuildTable() {
            var data=window._chartData; if(!data||!data.length)return; var el=document.getElementById('table-scroll'); if(!el)return;
            var keys=Object.keys(data[0]); var html='<table class="min-w-full"><thead><tr class="table-header-row">';
            keys.forEach(function(k){var arrow=window._sortCol===k?'<span class="sort-arrow active">'+(window._sortDir==='asc'?'\u25B2':'\u25BC')+'</span>':'<span class="sort-arrow">\u25B2</span>'; html+='<th class="sort-header px-3 py-2 text-left text-[11px] font-bold text-white uppercase tracking-wider" onclick="sortTable(\''+k.replace(/'/g,"\\'")+'\')">'+escapeHtml(formatColName(k))+arrow+'</th>';});
            html+='</tr></thead><tbody class="divide-y divide-gray-100 dark:divide-gray-700/30">';
            data.forEach(function(row,idx){var bg=idx%2===0?'bg-white dark:bg-transparent':'bg-gray-50/70 dark:bg-white/[0.02]'; html+='<tr class="'+bg+' hover:bg-blue-50/50 dark:hover:bg-brand-500/5 transition-colors">'; var first=true; keys.forEach(function(k){var cls=first?'font-medium text-gray-800 dark:text-gray-200':'text-gray-600 dark:text-gray-400'; html+='<td class="px-3 py-2 text-sm whitespace-nowrap '+cls+'">'+escapeHtml(String(row[k]!=null?row[k]:''))+'</td>'; first=false;}); html+='</tr>';});
            html+='</tbody><tfoot><tr class="bg-gray-100 dark:bg-white/[0.04] border-t-2 border-gray-300 dark:border-gray-600">'; var first=true;
            keys.forEach(function(k){if(first){html+='<td class="px-3 py-2 text-sm font-bold text-gray-800 dark:text-gray-200 whitespace-nowrap">Total</td>';first=false;return;} var isNum=data.every(function(r){var v=r[k];return v==null||v===''||!isNaN(Number(v));}); var hasAny=data.some(function(r){return r[k]!=null&&r[k]!=='';}); if(isNum&&hasAny){var sum=0;data.forEach(function(r){var v=Number(r[k]);if(!isNaN(v))sum+=v;}); var hasDec=data.some(function(r){var v=r[k];return v!=null&&String(v).indexOf('.')!==-1;}); html+='<td class="px-3 py-2 text-sm font-bold text-gray-800 dark:text-gray-200 whitespace-nowrap">'+(hasDec?sum.toFixed(2):sum)+'</td>';}else{html+='<td class="px-3 py-2 text-sm whitespace-nowrap"></td>';}});
            html+='</tr></tfoot></table>'; el.innerHTML=html;
        }

        function sortTable(colKey) {
            var data=window._chartData; if(!data||!data.length)return;
            if(window._sortCol===colKey){window._sortDir=window._sortDir==='asc'?'desc':'asc';}else{window._sortCol=colKey;window._sortDir='asc';}
            var dir=window._sortDir==='asc'?1:-1; var isNum=data.every(function(r){var v=r[colKey];return v==null||v===''||!isNaN(Number(v));});
            data.sort(function(a,b){var va=a[colKey],vb=b[colKey]; if(va==null)va=''; if(vb==null)vb=''; if(isNum)return(Number(va)-Number(vb))*dir; return String(va).localeCompare(String(vb))*dir;});
            rebuildTable();
        }

        function exportCSV() {
            var data=window._chartData; if(!data||!data.length)return; var keys=Object.keys(data[0]);
            var esc=function(v){var s=String(v==null?'':v); if(s.indexOf(',')!==-1||s.indexOf('"')!==-1||s.indexOf('\n')!==-1)return '"'+s.replace(/"/g,'""')+'"'; return s;};
            var rows=[keys.map(function(k){return esc(formatColName(k));}).join(',')];
            data.forEach(function(row){rows.push(keys.map(function(k){return esc(row[k]);}).join(','));});
            var blob=new Blob([rows.join('\n')],{type:'text/csv;charset=utf-8;'}); var url=URL.createObjectURL(blob); var a=document.createElement('a'); a.href=url; a.download='afl-stats-export.csv'; document.body.appendChild(a);a.click();document.body.removeChild(a); URL.revokeObjectURL(url);
        }

        function showView(view,btn) {
            document.querySelectorAll('.view-btn').forEach(function(b){b.classList.remove('active-view');}); btn.classList.add('active-view');
            var t=document.getElementById('view-table'),c=document.getElementById('view-chart');
            if(view==='table'){t.classList.remove('hidden');c.classList.add('hidden');}else{t.classList.add('hidden');c.classList.remove('hidden');renderChart(view==='column');}
        }
        function renderChart(horizontal) {
            if(!window._chartData||!window._chartData.length)return;
            if(typeof Chart==='undefined'){var s=document.createElement('script');s.src='https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js';s.onload=function(){buildChart(horizontal);};document.head.appendChild(s);}else{buildChart(horizontal);}
        }
        function buildChart(horizontal) {
            if(window._chartInstance)window._chartInstance.destroy(); var data=window._chartData,keys=Object.keys(data[0]),lk=keys[0];
            var labels=data.map(function(r){var v=r[lk];return typeof v==='string'&&v.length>20?v.substring(0,18)+'..':v;});
            var nk=keys.filter(function(k,i){return i>0&&data.some(function(r){var v=r[k];return typeof v==='number'||(typeof v==='string'&&!isNaN(parseFloat(v))&&isFinite(v));});});
            if(!nk.length){document.getElementById('view-chart').innerHTML='<p class="text-sm text-gray-400 text-center py-8">No numeric data to chart</p>';return;}
            var isDark=document.documentElement.classList.contains('dark'),palette=['#3b82f6','#10b981','#f59e0b','#ef4444','#8b5cf6','#ec4899','#06b6d4','#84cc16'];
            var datasets=nk.map(function(k,i){return{label:k,data:data.map(function(r){return parseFloat(r[k])||0;}),backgroundColor:palette[i%palette.length]+(nk.length===1?'cc':'aa'),borderColor:palette[i%palette.length],borderWidth:1,borderRadius:4};});
            window._chartInstance=new Chart(document.getElementById('results-chart'),{type:'bar',data:{labels:labels,datasets:datasets},options:{indexAxis:horizontal?'x':'y',responsive:true,maintainAspectRatio:false,scales:{x:{ticks:{font:{size:11},maxRotation:45}},y:{beginAtZero:true,ticks:{font:{size:11}}}}}});
            document.getElementById('view-chart').style.height=(horizontal?Math.max(300,labels.length*28+60):350)+'px';
        }

        // History
        var HISTORY_KEY='afl_search_history', HISTORY_MAX=20;
        function loadHistory(){try{return JSON.parse(localStorage.getItem(HISTORY_KEY)||'[]');}catch(e){return[];}}
        function updateHistoryBadge(){var b=document.getElementById('history-badge');if(!b)return;var c=loadHistory().length;b.textContent=c;if(c>0)b.classList.remove('hidden');else b.classList.add('hidden');}
        function saveFinderToHistory(title,data){if(!data||!data.length)return;var h=loadHistory();h.unshift({query:title,answer:'Found '+data.length+' results',data:data,r_code:null,provider:'stat-finder',ts:Date.now()});if(h.length>HISTORY_MAX)h=h.slice(0,HISTORY_MAX);try{localStorage.setItem(HISTORY_KEY,JSON.stringify(h));}catch(e){}updateHistoryBadge();}
        function timeAgo(ts){var s=Math.floor((Date.now()-ts)/1000);if(s<60)return'just now';var m=Math.floor(s/60);if(m<60)return m+'m ago';var h=Math.floor(m/60);if(h<24)return h+'h ago';return Math.floor(h/24)+'d ago';}
        function renderHistoryList(){var el=document.getElementById('history-view');var h=loadHistory();if(!h.length){el.innerHTML='<div class="text-center py-12 text-gray-400 dark:text-gray-500"><p class="text-sm">No history yet</p></div>';return;}var html='<div class="space-y-2">';h.forEach(function(e,i){var isFinder=e.provider==='stat-finder';var color=isFinder?'#10b981':'#3b82f6';var label=isFinder?'Stat Finder':(e.provider||'AI');var rows=e.data?e.data.length:0;html+='<div class="flex items-center gap-3 p-3 rounded-xl border border-gray-200 dark:border-gray-700/40 bg-white dark:bg-[#1a1b23] hover:border-brand-500/30 transition-all cursor-pointer group" onclick="loadHistoryEntry('+i+')">';html+='<div class="flex-1 min-w-0"><p class="text-sm font-medium text-gray-800 dark:text-gray-200 truncate">'+escapeHtml(e.query)+'</p>';html+='<div class="flex items-center gap-2 mt-1"><span class="text-[10px] px-1.5 py-0.5 rounded-full font-medium" style="background:'+color+'20;color:'+color+'">'+label+'</span>';html+='<span class="text-[10px] text-gray-400">'+rows+' rows</span><span class="text-[10px] text-gray-400">'+timeAgo(e.ts)+'</span>';html+='</div></div>';html+='<button onclick="event.stopPropagation();deleteHistoryEntry('+i+')" class="opacity-0 group-hover:opacity-100 text-gray-400 hover:text-red-500 transition-all p-1" title="Delete"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button></div>';});html+='</div><div class="text-center mt-4"><button onclick="clearHistory()" class="text-xs text-gray-400 hover:text-red-500 transition-colors">Clear all</button></div>';el.innerHTML=html;}
        function loadHistoryEntry(i){var h=loadHistory();var e=h[i];if(!e)return;if(e.provider==='stat-finder'){showTab('finder');renderFinderResults(e.data,e.query);}else{showTab('search');}}
        function deleteHistoryEntry(i){var h=loadHistory();h.splice(i,1);try{localStorage.setItem(HISTORY_KEY,JSON.stringify(h));}catch(e){}updateHistoryBadge();renderHistoryList();}
        function clearHistory(){try{localStorage.removeItem(HISTORY_KEY);}catch(e){}updateHistoryBadge();renderHistoryList();}
        updateHistoryBadge();
    </script>
