name: Update Player Stats

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 6am UTC
  workflow_dispatch:       # Allow manual trigger

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: gh-pages

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Checkout scripts from main
        run: git checkout main -- scripts/scrape_stats.py

      - name: Scrape AFL Tables
        run: python scripts/scrape_stats.py
        env:
          OUTPUT_DIR: '.'

      - name: Commit and push
        run: |
          rm -rf scripts/
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add player-stats.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update player stats $(date -u +%Y-%m-%d)"
            git push
          fi
